body:
  text: 讀書偶記卷二副都御史雷鋐撰窮理之功在格物盡性之功在踐形此徹上徹下無纖毫影響處禮鄉飲酒義云天地嚴凝之氣始於西南而盛於西北此天地之尊嚴氣也此天地之義氣也按先天圖之巽坎艮坤是也天地溫厚之氣始於東北而盛於東南此天地之盛德氣也此天地之仁氣也按先天圖之震離兌乾是也又按以河圖參之竒之由北而東而南以終於西者即天地仁氣之流行也耦之由南而西而北以終於東者即天地義氣之流行也冬至一陽生而春而夏則仁氣之盛也秋則陽消而陰長矣圖之北東陽居内南西陽居外者冬而春陽方生而長夏而秋陽長極而消也夏至一陰生而秋而冬則義氣之盛也春則陰消而陽長矣圖之南西陰居内北東陰居外者夏而秋陰方生而長冬而春陰長極而消也河圖與先天圖觀諸鄉飲酒義之言而已明矣孔子性相近之言實萬世言性之宗旨孟子性善之言正是相近之實際相近者善之相近也以萬物為一體者堯舜之仁也今人乍見孺子入井而怵惕惻隱可謂不與堯舜之仁相近乎故曰性善也擴而充之人皆可以為堯舜也必待擴充之力者氣質有不同也孟子言性與孔子無二旨也或問張子心統性情其性靜而情動乎曰性者心之理也心者動靜之樞也靜則情之斂動則情之發斂則不見其情矣專謂之性可也發則性露於情矣專謂之情亦可也孟子所以有四端之說也或問性之為仁義禮智自其發而後有端緒可尋若寂然不動之時何自而指其為仁耶義耶禮與智耶曰寂然不動之時渾然生理涵孕於中即仁也此仁所以包乎義禮智也生理有自然之裁制義也自然之節文禮也自然之分别智也仁包乎義禮智此朱子訓仁則曰心之德也或問貞下起元造化之妙然也人心之智與仁若何曰吾心之理非知之何以能體而行之此中庸三達德先曰智而後曰仁勇也雖然所知者亦知此生理之脈絡而已仁所以包乎義禮智也如造化之貞即元氣之斂藏非元之外别有貞也愛惡欲懼生於内喜怒樂哀形於外統言七情不如此更分明或曰情本於性今如此言則情只本於心乎曰以道心言之則愛而喜者仁之發也惡而怒者義之斂也欲而樂者禮之著也懼而哀者智之藏也以人心言之其愛惡欲懼之或偏喜怒樂哀之無節皆性汨於氣而失焉者也故必道心為主人心聽命焉斯謂之性其情道心即性也人心之正者道心為之主即性宰乎氣也人心之偏者道心之有蔽即性汨於氣而失焉者也非道心為一心人心又為一心也如飲食男女之欲人心也而道存焉知道存即道心也不知其為道而肆焉則危者愈危微者愈微矣故必道心為主人心聽命也是知謂心即性者非也離心性而二之者亦非也禮運云人者其天地之德陰陽之交鬼神之會五行之秀氣也此周子太極圖說所謂無極之真二五之精妙合而凝惟人得其秀而最靈者也夫天地之德其性也陰陽之交鬼神之會其心也具五行之秀氣故五性動而情生矣孔子所以謂性相近孟子所以謂性善至周子而理氣合一之妙剖洩盡矣程張言性兼言氣質亦不外此而得之又云人者天地之心也五行之端也食味别聲被色而生者也夫天地之心即太極也五行之端以理言之則仁義禮智信之發也以氣言之則心肝脾肺腎之屬是也食味别聲被色此物欲所以易累必踐形盡性乃葆其天地之心語其要亦曰道心為主人心聽命而已誠意之外何以復有正心之功曰誠意則人鬼關意誠矣人而非鬼矣猶恐其用情之偶偏朱子所謂官街上錯了也曰然則大學之正心只中庸之致和而缺却致中之功乎曰體立而後用有以行未有致和而不本於致中者也曰或謂正心猶中庸之戒慎恐懼也誠意猶中庸之謹獨也如此則致中屬之正心致和屬之誠意矣曰大學言欲正其心者先誠其意今將曰欲致其中先致其和可乎安溪李文貞公之言得矣蓋誠意猶中庸之戒懼謹獨也正心猶中庸之致中和也戒懼謹獨則無不中且和矣然朱子猶曰自戒懼而約之自謹獨而精之涵養省察愈純愈密之功如此其至矣則知誠意之外别無正心之事殆亦約之精之之云爾曰大學誠意言君子必慎其獨非專以謹獨言乎曰意之好惡直貫至事為之末所謂意之全體貫徹事為獨乃意之起頭謹獨是於誠意中提出一𦂳要關頭可知誠意之功自包戒懼謹獨言也曰中庸末章内省不疚非意誠乎不動而敬不言而信非心正乎曰此亦分劈不開内省而疚固意之不誠不敬則肆心萌矣不信則偽心生矣肆也偽也尚得謂意之誠乎然則以戒懼慎獨分屬正心誠意者固不如安溪之言為得也沈闇齋先生云周子教人尋孔顔樂處某謂當從論語開篇第一章尋起按此言最確實葢學之正習之熟說之深由此而樂而不慍孔顔之樂在其中矣禮所以固人肌膚之會筋骸之束視聽言動坐立間稍不謹飭便至懈弛而昏惰放肆隨之此入德第一關頭最當警愓而痛懲也繙舊書得先大父手帖二方一錄王陽明示徐曰仁應試云入塲之日切勿以得失横在胸中令人氣餒志分非徒無益而又害之塲中作文先須大開心目見得題意了了即放胆下筆縱沒出色處辭氣亦條暢今人入塲有志氣局促不舒展者是得失之念為之病也將進塲十日前便須練習調養葢尋常不曽早起得慣忽然當之其日必精神恍惚作文豈有佳思須每日雞初鳴即起盥櫛整衣端坐抖擻精神勿使昏惰日日習之臨期不自覺辛苦矣今之調養者多是厚食濃味劇酣謔浪或竟日偃卧如此是撓氣昏神長傲而召疾也豈養精神之謂哉務須淡飲食薄滋味則氣自清寡思慮屛嗜欲則精自明定心志少眠睡則神自澄君子未有不如此而能致力於學問者每日或倦甚思休少偃即起勿使昏睡既晚即睡勿使乆坐進塲前兩日即不得翻閲書史雜亂心目每日只可看文字一篇以自娯務在怡神適趣忽充然滚滚若有所得勿使氣輕意滿益加含蓄醞釀若江河之浸泓衍泛濫驟然决之一瀉千里矣每日閒坐時衆方囂然我獨淵黙中心融融自有真樂蓋出乎塵埃之外而與造物者遊一錄唐荆川與馮午山柬云秀才作文不論工拙只要真精神透露如有真精神雖拙且滯必是英俊竒偉之士公考試看文不必論竒論平論濃論淡但窺其真精神所向如肯說理肯用意必是真實舉子也如無理無意而但掇拾浮華必是詐偽小人此是閲卷大關鍵按此二帖雖皆為塲屋而言士君子讀書養氣務學立品之要已具此矣嗚呼此先大父之手澤也曽南豐作趙公救菑記略云公前民之未飢問屬縣菑所被者幾鄉民能自食者有幾當廪於官者幾人溝防構築可僦民治之者幾所庫錢倉粟可發者幾何富人可募出粟者幾家使各書以對而謹其備至期人受粟日一升幼小半之憂其衆且蹂也使受粟者男女異日而人受二日之粟憂其流且亡也於城市郊野為給粟之所凡五十有七使各以便受之而告以去其家者勿給計官為不足用也取吏之不任職而寓於境者給其食而任以事不能自食者有是具也能自食者為之告富人無得閉糶又為之出官粟得五萬二千餘石平其價予民為糶粟之所十有八使糴者自便如受粟又僦民完城四千一百丈為工三萬八千計其傭與錢又與粟再倍之民取息錢者告富人縱予之待熟官責其償棄男女者使人得收養之明年春大疫為病坊處疾病之無歸者募僧二人屬以視醫藥飲食令無失所凡死者使隨收瘞之法廩窮人盡三月當止是歲盡五月而止按此趙公救災之政綜理周密可法唯官不足用近少吏之不任職而寓於境者委紳衿殷實之賢能者可矣或曰計民之傭與錢矣又倍粟以予之毋乃太多乎曰民之有力者食其力而粟加倍則咸自奮不安於惰矣且奪富民之有窺公家之積皆此輩也食力而餘粟足以贍其家他何虞焉河北地震水災隳城郭壞廬舍百姓暴露乏食有司建言請發倉廩與之粟壯者人日二升幼者日一升南豐救災議略云遭非常之變者必有非常之恩然後可以振之今百姓暴露之食已廢其業使之相率日待二升之廩於上則其勢必不暇乎他為是農不得修其畎畝商不得治其貨賄工不得利其器用閒民不復得轉移一切執事棄百事而專以待升合之食是真以餓殍之養養之也以中户計之户為十人壯者六人㓜者四人一户月當受粟五石不乆行則百姓何以贍其後乆行之則被水之地既無秋成之望非至來歲麥熟賑之未可以止自今至來歲麥熟凡十一月户當受粟五十石今被災者十餘州仰食縣官者百萬户當用粟數百萬石何以辦之至於給受之際有淹速有均否有真偽有會集之擾有辨察之煩厝置一差皆足致弊且不過能使之得旦暮之食耳其於屋廬構築之費將安取哉彼日就食於州縣必相率而去其故居雖有頺垣壞屋之尚可完者亦棄之而不暇顧其害又可謂甚也己為今之策賜之以錢五十萬貫貸之以粟一百萬石而事足矣何則被災十萬户一户得粟十石得錢五十貫下户常産之貲平日未有及此者也彼得錢以完其居得粟以給其食則農得修其畎畝商得治其貨賄工得利其器用閒民得轉移執事一切得復其業而不失其常生之計與專待二升之粟而勢不暇他為者豈不逺哉按此法更簡而民更受實惠免守候之苦而不荒本業然貸不如賑貸則取償民力或有不贍而賑則難繼或來歲復有災荒將奈何則不能自食者賑之能自食者貸之或平價糶之而已或曰愚民多與之粟易至濫用如趙公男女異日人受二日之粟又不免奔走守候之苦斟酌二者之間人給以十日之粟也可其分地發粟得人任事以及僦民計傭之法皆必如趙公乃無弊也有司或有掣肘不得賑貸將奈何曰小歉平糶亦可濟大歉無賑且貸則所謂求牧與芻而不得矣雖然便宜行之以一官易民命奚不可之有又按平糶必須逐日使糴葢小民之乏錢力不能一日而糴數日之粟也且必計口而糴家十口者每日許糴十升此須酌量各地方升斗大小使黠者不得賤糴貴糶粟乃可繼然非分地多任事得人則守候之苦仍不可勝言以此知趙公救災民不荒本業者於城市郊野給粟之所五十有七則授民便無淹滯故也豈特憂其流亡已哉出粟煮粥亦須多為之所使男女異處量地之廣狹擇各祠廟之類大約每食以五十人為限每人與一籤執籤者入俟食畢出再發籤入方無擠擁紛擾之患每人許擕一器給粥多少如其意葢恐老幼有不能赴者也募富人出粟煑粥并須委富人任其事但不可是日某人出粟即委之任事恐性鄙吝者有刻減之弊須擇忠厚明敏者專以任之為有司者巡察各處有不遑暇食之意乃得設養濟院收鰥寡孤獨及廢疾之人凡年壯非殘疾者不得入有司周䘏之别男女之區酌衣食之費上司於所經過之屬邑申飭有司加意存䘏富民有犯當罰者罰出粟米助其養此仁政之先務也若養濟院或不足居住許以近城寺院為之此紹興時詔也要亦擇其閒空者可也積貯倉榖以平糶收錢榖革除額外需索之弊此惠民之大者痛懲蠧役刁民以息訟端嚴禁賭博游手以清盜源興學校禮賢才以厚風俗民之貧病無依者生有養濟院以恤之死有義塚以瘞之此任州縣之職者不容一日不盡心於其間也晉陶侃嘗造船木屑竹頭皆令藏之後皆有用處綜理家事不可不知此意為國用人尤不可不知此意南宋趙方少從張南軒學知青陽縣時告其守曰催科不擾是催科中撫字刑罰不差是刑罰中教化此語凡為民牧者皆當書於座右朱子於大學或問格物章先言心之體用次身之所具次身之所接然後及於天地鬼神幽明上下所謂一塵之微一息之頃推類而極言之耳王姚江格亭前竹子七日成病其未深讀朱子之書可知今人猶有病朱子格物之說者盍取或問一書切體之聞耿公定向督學南畿時池州守問朱子窮理與陽明致良知之說公曰試以現在職業言之如要治民即窮到獲上信友順親誠身又窮到明善均此身也必曰明善乃能誠身何也人只見此血肉之軀不惟與民物不相關即父子兄弟亦常間隔能反身自窮我身我心從何處生來識得渾然與物同體意思則四端萬善滿腔皆是此乃所謂明善乃能誠身守曰發揮明透公蹙然曰願吾輩從此省身克己使一郡民物窮簷幽谷皆得其所乃為發揮耳按此段論窮理最得朱子之意如此就實地作功夫講學乃不是空談羅近溪問晉江莊生云如何能出離生死曰不著近溪首肯耿公曰未也存順没寧是為出離吾人旦晝所為無愧怍則夣寐亦安推此則生死可見按此亦最切實不影響玩致良知三字不錯所以致良知者只在一提一喝之間則入禪耳人心之靈莫不有知即良知也要必自讀書以至處事接物莫不窮其理所知乃周遍而精切所以能窮理者即此良知而窮理所以致良知耳此徹内外之學也先提撕喚醒此心使常惺惺此主敬工夫良知所以不昏昧也然非事事物物推究恰好條分縷析燦然分明安能泛應曲當乎若謂本吾良知發出自然與古人不爽毫釐此非生知上哲能之乎竊恐生知上哲正不自任胸臆其虚心參酌更加細密耳所貴於窮理者如周禮一書見聖人治天下之法皆天理之周流貫徹處在今日却須得其精意而不必盡泥其法雖聖人處今日亦必有因時變通處是故致知之功在窮理非抛却書冊也亦非泥著書冊也夫學問之道一以貫之孝而已矣是故以父母之心為心天下無不友之兄弟由父母而上之則祖宗也以祖宗之心為心天下無不和之族人由祖宗而上之則厥初生民之天地也以天地之心為心天下無不愛之民物至於民胞物與學問之道無以加矣要自孝之一念積而充之故曰天地之性人為貴人之行莫大於孝嗚呼此其所以通神明光四海而為至德要道與氣昏則惰惰則益昏何以治之敬而已矣昏難治治惰始所謂整齊嚴肅則心自一一則自無非僻之干如此存養乆之則天理自然明也聞梁邨師云周程張朱繼絶學之傳通性命之原也若漢之諸葛亮唐之宋璟狄仁傑郭子儀陸贄宋之韓范司馬李綱性命之原未能洞徹而風節事業彪炳千古為一代大人物者何哉以其篤於忠孝故也忠孝篤摯是即本於所性所命全天地之正氣也若徒才氣用事表裏不符晩節末路不如人意者多矣待人貴謙恕即有事當辨論必從容善道切勿衝口而出形人之短令人不堪吾屢戒而屢犯此氣質之未變也若人有衝口而出言我之短此即是好師友虚心納之返躬省之受益多矣朱子生平峻潔晚歲益通明近世輕於非訕為其教不便嗜慾耳然士遵依朱子雖未知道不敢踰閑或詆訶詼諧之者必鮮耻多欲厭治幸亂黙懷無父無君之根者也此陳幾亭云爾然幾亭生當明季覩非訕朱子之害至於無父無君不歸罪陽明之作俑何耶陸稼書先生云顔子三月不違仁聖人何以知之葢即於非禮勿視聽言動知之此徹内徹外之言學者得此可知内外功夫非兩橛矣斷一木殺一獸不以其時非孝也於此可悟孝之道無所不貫天下無性外之物凡身之所具耳目手足聰明恭重之理皆是也凡身之所接親義序别信之道皆是也凡天地盈虛消息之妙萬物生長收藏之宜皆是也其理莫不具於一心故曰性者心所具之理也朱子之論格物即孟子之言知性即此可悟矣或曰子言學問之道一以貫之孝而已矣與曾子之言忠恕異乎同乎曰由親親推之而仁民推之而愛物即恕也程子所謂擴充得去天地變化草木蕃也所以盡是心而推之者即忠也宋胡安定孫明復二先生皆為天下師少同學問後來竟不相悅此二公器量疑皆有不足處若富鄭公因撤簾事謂韓魏公不早通之甚不滿魏公魏公却終身致敬不衰此是韓之器量大于富處撤簾事魏公迎機而導當事而決如何能早通於鄭公鄭公正人其量之不大由理之未明信乎程子曰量由識長識高則量大也太極者誠也誠之之功在敬以直内義以方外敬以直内誠之源也義以方外誠斯立焉必直内乃能方外即主靜之意也敬義夾持直上達天德則人極立矣梁邨師論通書果而確云果即誠之通也確即誠之復也親親而仁民仁民而愛物由根而幹而枝葉也忠者生意之中涵也恕者生意之流貫也延平先生云學問之道不在多言但黙坐澄心體認天理若是雖一毫私意之發亦退聽矣乆乆用力於此庶幾漸明講學始有益耳按此非廢講學也有尊德性一段涵養功夫講學始有著落今人開口辨論全無黙坐體認之意如此講學縱説得不錯亦只是口頭禪耳學問須自不愧屋漏中做出方是有根古今人物常變始終如一者皆是這裏有功夫陳白沙和龜山此日不再得詩云吾道有宗主千秋朱紫陽說敬不離口示我入德方義利分兩途析之極毫芒聖學信匪難要在用心臧善端日培養庶免物欲戕此等語與薛胡無異然其他所論學以自然為宗不免過高之弊不如薛胡之平實謹守下學上達之序也白沙與趙提學書云僕年二十七始發憤從呉聘君學其於古聖賢之書葢無所不講然未知入處比歸白沙專求所以用力之方日靠書冊尋之忘寢忘食者累年而卒未得焉於是舍繁求約惟在靜坐乆之然後見吾此心之體隱然呈露常若有物日用應酬隨吾所欲如馬之御銜勒也體認物理稽諸聖訓各有頭緒來厯如水之有源委也按此是白沙一生實錄質之孔門教人不外博文約禮程朱標出主敬為知行之本入手功夫更無他途白沙初年日靠書冊不免失之泛騖卒乃盡舉而空之專心靜坐又失之虚寂皆不可為訓也七介以相見也不然則已慤三辭三讓而至不然則已蹙凡禮之周詳委折不徑情而直行皆如此余見前輩氣度端謹應酬多遲重審慎後生慢易輕率者反笑之此風氣厚薄所由分也故曰禮之於人也猶酒之有糵也君子以厚小人以薄親在行禮於人稱父人或賜之則稱父拜之人子不敢自專類如此靜坐中有一念未起時此喜怒哀樂未發氣象也有將聖賢言語切已體認時有自省平日言行過愆時有研審立身行己國計民生時此皆思誠功夫也却不可思緒紛糾一事未了他事如麻又生耳葢惡念易去雜念難除聖賢不言無思只言思無邪言慎思言近思言思不出其位也樂記人生而靜天之性也感於物而動性之欲也物至知知然後好惡形焉好惡無節於内知誘於外不能反躬天理滅矣夫物之感人無窮而人之好惡無節則是物至而人化物也人化物也者滅天理而窮人欲者也此等精切之言與語孟等宋儒太極圖說西銘定性書顔子好學論皆是發明此意天高地下萬物散殊而禮制行矣流而不息合同而化而樂興焉此等識見胸襟處天地間真是活潑潑地想見横渠作西銘時是如此心中斯須不和不樂而鄙詐之心入之矣外貌斯須不莊不敬而易慢之心入之矣此數語切體日省之可以進德矣有服人召之食不往大功以下既塟適人人食之其黨也食之非其黨弗食也按其黨食之者非盛饌延賓也余居祖喪數月後曾為人強至宴會却之不力至今負疚於心孝子之有湥愛者必有和氣有和氣者必有愉色有愉色者必有婉容孝子如執玉如奉盈洞洞屬屬然如弗勝如將失之嚴威儼恪非所以事親也此數語須常自切已體驗人莫不愛其親然愛有不深者嗜欲多則天性漓故縱心任氣不和不敬以自蹈于不孝也喪大記中期之喪三月既塟食肉飲酒者當指旁親伯叔兄弟也又曰期終䘮不食肉不飲酒父在為母為妻而不言祖父母何也方望溪先生云母與妻疑為父在而屈者也故著之若祖父母不以父在為疑者也則不待言矣又按食肉飲酒不與人樂之葢雖可食肉飲酒時亦家食耳斷無與宴會之理執虚如執盈入虚如有人形容敬處如畫功夫至此庶幾不愧屋漏也表記内君子莊敬日強安肆日偸之語伊川先生每愛誦之此植躬之要也其曰君子不失足於人不失色於人不失口於人又曰君子不以其所能者病人不以人之所不能者愧人此接物之要也又云事君難進而易退緇衣云私惠不歸德君子不自留焉此出處辭受之要也父有服宮中子不與於樂今人祖父母之期服雖除而父有服凡宴會有音樂者不當與也若出仕他方則有難拘處然不念父憂演戱娯賓則亦非孝矣訪河南孫仲符于京邸見其案頭有方簡肅公文集數冊葢莆田方公良永也考其生平不拜劉瑾直劾錢寧退休家食不忘廟堂晚屢起用巡撫司寇以終養辭以老疾辭葢一代完人也與姚江同時所學卓然不惑其作覺軒序云近世有一切簡易自立門庭者教人以瞑目靜坐謂即此可以悟道而聖門格致之學顧指為破碎支離究其所謂覺者茫無依據視空寂之教殆無以異云云辨姚江之新學也按舒文節公芬同姚江之時而不惑其學羅整菴先生而外方舒二公其皎皎矣妾母不世祭之說余得之李侍講立侯曰妾母者非庶子自目其母也葢屬嫡子言也嫡子可祭妾母嫡孫不祭妾祖母故曰妾母不世祭也然則庶孫自祭於其私室可也宗法之難復古也如高祖之嫡子孫無後當時未有繼嗣自曾祖以下四世矣祭高祖之時小宗之義何屬乎立侯曰此自是曾祖一脈之嫡為小宗也於義何取曰以服制承重斷之也假令高祖在嫡子孫無後曾祖一脈已厯四世有不為高祖承重者乎故曰以曾祖一脈之嫡為高祖小宗也方望溪先生云古未有高祖之嫡子孫無後而不立繼嗣者今已厯四世無越而立繼之義權宜斷之只得如李君云云虞書之精一丹書之敬義萬世論學之淵源六經四子無出於此博約即精一也忠恕即敬義也大學之格致誠正精一也中庸之戒懼慎獨敬義也敬以直内主一也義以方外則無不精而皆協於一矣鬼神者造化之迹也春夏秋冬者陰陽之迹也先天圖畫出個天地位焉萬物育自在其中矣後天圖畫出個四時行焉百物生自在其中矣合河師云先天乃道生天地之圖也後天乃天地生萬物之圖也喜怒哀樂未發生意之中涵也發而中節生意之流貫也喜與樂之生意易見聖人之怒所以懲奸而遏惡即不得已殺之哀心行焉生意未嘗有間斷也夫焉有所倚言心體也即未發之中也大德敦化者此也肫肫其仁三句形容無倚之心體仁即生意之中涵也淵淵其淵即中涵者靜而深也浩浩其天即中涵者廣且大也生意中涵故天下大經皆自此流而貫之也中涵者靜而深所以立天下之大本也中涵者廣且大天地之所以為化育者在是矣故曰大德敦化也聖人心體無非生意中涵所謂體之一者此也親親而仁民仁民而愛物皆此一以貫之也忠即生意之中涵也恕即生意之流貫也然非聖人安能如此一理渾然泛應曲當乎故學者必黙識體認充滿此生意隨事精察而力行之至於真積力乆而有得焉然後此心洞然親親仁民愛物事為節目縷析條分無非此一以貫之而已矣子在川上曰逝者如斯夫不舍晝夜天地之化往者過來者續無一息之停乃道體之本然也所謂道體之本然者何即天地之心也天地以生物為心於穆不已無非生意流貫故化育流行無一息之停聖人之心全體天地生物之心此純亦不已之天德也已欲立而立人已欲達而達人即此生意自然流貫故曰有天德便可行王道也雖然吾心有一毫私意之萌即天命斷而不行人物隔而不通矣故又曰其要只在謹獨天地以生物為心必四時行而後百物生夫百物所以生者四時之變化四時所以變化者天命之不已天命不已即天地生物之心之不已也聖人體天地生物日用動靜皆生意之流露所謂申申夭夭者此也所謂老安少懷者此也所謂仕止乆速各當其可者此也故曰予欲無言又曰天何言哉四時行焉百物生焉天何言哉程子謂此可謂至明白矣學者須體會得之孔顔之樂如何尋處先儒隱而不發竊思人欲盡處天理流行隨處充滿無少欠闕數語可形容孔顔樂處何也即此生意之盎然一心藹然四達者也所謂仁也顔子心不違仁雖簞瓢陋巷不改此樂也孔子中心安仁雖疏水曲肱此樂亦在其中也然則欲尋孔顔之樂亦黙體吾心之生意而已矣大抵生意是聖學真種子克己如耨草涵養乃灌溉培育之功由是欣欣向榮暢茂條達而不容己焉孟子所謂樂則生矣此之謂也學者必有見於此實加克己涵養功夫孔顔之樂方可尋得不然水流花放無非生意於我何有哉釋氏以明鏡喻性所照者虚影也吾儒以穀種言性所貫者生意也種一而已而所成有萬無一不與種相肖者此一貫之學也儒釋之分根源在此故釋氏以大地山河為幻相吾儒則親親仁民愛物此心自不容己是說也本之李文貞公云涵養吾一一者不貳不雜也盖純乎天理之極無一毫人欲之私也周子所以謂一者無欲也中庸章句云一者誠也純乎天理無一毫人欲之私斯之謂誠仁義禮智天下之道千變萬化皆由是出未發時渾然無跡只是一性體此性體也以其本於天則謂之命以其蘊於心則謂之德以其達於外則謂之道以其真實無妄則謂之誠以其不貳不雜則謂之一以其不偏不倚無過不及則謂之中以其由中發外脈絡分明則謂之理朱子答彭子壽云前此文字上用力太多亦是一病葢欲應事先須窮理而欲窮理又須養得心地本源虚靜明澈方能察見幾微剖析煩亂而無所差錯程子所謂學莫先於致知又未有致知而不在敬者正為此也按此是學之嫡脈朱子得力於延平者在此向上遡之子思所謂尊德性而道問學者是也學之正宗由孔孟而程朱明代薛文清公純正無疵矣至其餘諸子沈潛高明之不同各有得力處亦各有偏處然如胡敬齋之嚴密學者或過於拘則有之無規矩之越也白沙陽明之流弊猖狂而不可收拾學術之不可不慎也如此每見孫夏峯論學多鶻突處如夏峯人品之高曷易及哉此又在乎能自得師也大抵前人學雖有偏其得力處却實有把握死生禍福不可揺奪此之謂實學予近見劉静修先生河圖辨有云河圖之中宮則先天圖之所謂無極所謂太極所謂道與心者也即太極圖之所謂無極而太極所謂太極本無極所謂人之所以最靈者也河圖之東北陽之二生數統夫陰二成數則先天圖之左方震一離兌二乾三者也即太極圖之左方陽動者也其兌離之為陽中之陰即陽動中之為陰靜之根也河圖之西南陰之二生數統夫陽之二成數則先天圖之右方巽四坎艮五坤六者也即太極圖之右方陰靜者也其坎艮之為陰中之陽即陰靜中之為陽動之根也河圖之竒偶即先天太極圖之陰陽而凡陽皆乾凡陰皆坤也河圖先天太極圖之左方皆離之象右方皆坎之象也是以河圖水火居南北之極先天圖坎離列左右之門太極圖陽變陰合而即生水火也按此於河圖先天圖太極圖可謂冰解凍釋矣先儒謂孔子言性兼氣質言孟子不言氣質不盡然也堯舜性之湯武反之非言氣質而何然則孟子言性善亦就氣質中指其根於性而發見者言之耳氣質雖有不善無虧於性如撥雲霧即可以見青天梁邨師有云程張言氣質之性未嘗不包羅于孟子書中孟子因當時人心利慾錮蔽已深大聲疾呼言性善以喚醒之不暇為周折語耳今以性理二字分言之性體渾然析之為仁義禮智脈絡分明是之謂理推之身則肅乂哲謀推之倫則親義序别皆理也即皆性也復性在於循理循理在於盡分葢性渾淪而理有條緒然理廣大而分更親切如孝之理無窮而吾有分内當盡之孝忠之理無窮而吾有分内當盡之忠隨在盡分則理得而性無虧矣格物者格此力行者行此豈待逺求哉太極即所謂至善也所謂中也程子云曾㸃漆雕開已見大意所謂大意者何葢對小成言也如兵農禮樂可仕而仕不免安于小成㸃之異撰開之未信見得聖人大本領即大學之明德新民止至善也所謂見道分明者亦此也問格物致知畢竟從何處下手曰朱子或問中言之悉矣今且先從讀書上格起書籍亦多十三經廿一史何者不當研究今且先從朱子小學一書格起能就小學一書格物以致其知則身心倫類處處著實不患乎誠意正心修身齊家之無其道矣故余語成均之同志者曰讀近思錄後正好著實讀小學不然言心言性終恐影響無得力處孔子發憤忘食是做甚功夫若只空守此心何用如此葢所謂好古敏以求之也所謂躬行君子未之有得也孔子自敘自十五至七十是如何做功夫看來立也不惑也知天命也耳順也不踰矩也皆是得力境界功夫總在一學字知行並進功夫進得一層則得力亦進一層故聖人終身上達却終身在下學中也曾㸃如登樓看山曾子却步步從山麓躡上去極費了力此身則已在山頂上矣易言學以聚之多識前言往行以畜其德窮理盡性以至于命書言學於古訓乃有獲後世虚無寂滅者不知此記誦辭章者亦不知此心之性不外仁義禮智四字萬事萬物之理亦不外這仁義禮智四字無内外無彼此故曰性即理也余偶見一書論河圖參天兩地而倚數及用九用六參伍錯綜之說曰天一天三天五是為參天地二地四是為兩地倚數者五合天一為六五合地二為七五合天三為八五合地四為九是九六七八之數皆倚參兩而起也圖之生數屬天者參一三五共九數此陽所以用九也屬地者兩二四共六數此陰所以用六也五於圖之中宮位五外一錯四為五二錯三非參伍乎綜一三五成九綜二四成六九六合為十五又綜二五一成八綜三四成七八七合為十五又五綜一與九五綜四與六五綜三與七五綜二與八皆為十五又一綜六錯八二綜七錯六三綜八錯四四綜九錯二皆為十五莫非參伍也而所綜所錯之參伍分之皆為九六或七八之數豈非參伍以變錯綜其數乎通其變於蓍而竒偶以分極其數於爻而剛柔以判未有外河圖而起數者也按此論自然明白確不可易此書多採先儒之說而不載其名錄之以俟考河圖中之十數前論未之及其論參伍錯綜亦只到九止或曰十即兩五合而成也殊不盡然圖中只一五耳何自而有兩五葢一二三四之數合之即為十也故六七八九皆從五合一二三四而成而十即一二三四合而成此所以為成數五也生數成數叅此最明其曰天一生水地六成之以是為生數成數似尚鶻突易用九用六從河圖生數來一三五為九二四為六今見於瞿塘來氏易注中其以八卦錯綜而成六十四卦尤見造化自然之妙學易者當叅考如邵子加一倍之法至四畫五畫時無名目安頓朱子謂於八卦之上又加兩儀四象亦似牽強来氏畫之圖於伏羲文王卦圖之前謂此作易之原理氣象數陰陽老少往來進退常變吉㓙皆在其中按此即河圖之意河圖竒偶交互即陰中有陽陽中有陰也一對二三對四六對七八對九陰陽之對待也一三五七九二四六八十陰陽之流行也其内外賓主之位即陰陽老少進退往來之妙也濓溪第二圖即是此之意但濓溪是要見互為其根處此則於對待中見流行自然處總皆從河圖中來此對待流行在其中互為其根之義亦在其中可謂神明於河圖者矣太極理也動靜神也陰陽氣也神也者妙乎理與氣之間者也微哉難言之矣濓溪圖説太極動而生陽靜而生陰脱却生字不見神之妙泥著生字亦不見神之妙河圖之妙全在成變化而行鬼神故陰陽老少進退往來俱在其中只以對待言不見流行之妙矣吾觀河圖只二氣旋轉不窮也讀書偶記卷二
