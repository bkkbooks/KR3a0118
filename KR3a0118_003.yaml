body:
  text: 讀書偶記卷三副都御史雷鋐撰克己即所以變化氣質復禮即復性功夫葢天命之性本純粹至善落到氣質則目之於色耳之於聲之類凡物欲之累皆己之氣質引之是謂身之私欲也克己者克去其身之私欲也此身之私欲雖克未能事事恰好便是性分虧欠處禮者天則也不言理而言禮朱子所謂先王制禮原是畫出個天理與人規矩可慿據故復性功夫即在日用動靜合乎禮而已克己之己字即人心之私也復禮則道心為主人心聽命矣但曰己曰禮皆就身上説故下以視聽言動為目皆靠身上實地的功夫然非心作主宰如何非禮處能克之故學者必提醒此以治其身朱子注云非至明不能察其幾非至健不能致其決即惟精惟一之謂也克己之至便到無我地位人只為拘於形骸之私要討便宜受用遂至徇人欲而滅天理然只言克己又恐人外形骸而不知所以踐其形故又曰復禮克己復禮一串説猶曰克己以復禮下文言非禮勿視聽言動克己也而復禮即在其中克己復禮到盡頭處所謂聖人形骸雖是人其實只一團天理矣孔子從心所欲不踰矩孟子言動容周旋中禮是也仲弟問敬義與知行何所屬曰敬者所以立知行之本也義兼精義集義知行皆統是矣又問程子云敬以直内義以方外仁也曰聖人教仲弓出門如見大賓使民如承大祭敬也己所不欲勿施於人恕也己所不欲不可施於人之裁制處即義也又問敬義二字於克己復禮何如曰克己不是空空克得敬勝怠義勝欲此克己之實功也敬以直内而無斯須之不敬義以方外而無纖毫之不義則復禮不外是矣問涵養吾一曰一者不貳之名也雜則貳欲則雜故周子曰一者無欲也葢純乎天理而已矣純乎天理則誠矣故朱子又曰一者誠也其涵養功夫亦不外敬義得之敬者主一無適所以涵養本原固不待言義則錯綜變化裁制合宜事有萬殊而無不協於一矣曾子明明為夫子之一貫下注脚曰忠恕今人或乃舍却忠恕别覔一貫何也朱注聖人之心一理渾然即忠也汎應曲當用各不同即恕也體之一即千萬箇恕總是一箇忠也曾子説出忠恕二字是信得夫子之道便是平日明明白白教學者的但夫子是大本大原自然流貫出來學者須就強恕功夫造上去其實所以能強恕者即忠也是謂徹上徹下程朱恐人淺看忠恕二字不見是夫子之一貫故推上天地之至誠無息萬物各得其所令人融會此理白文曾子口中却正就學者功夫上指㸃不如此認真便易支離一字以誠言以仁言俱只是此一誠以心之實理言仁以心之生理言實理即生理豈有二乎一貫二字以忠恕言以敬義言以中和言以誠明言俱見得體用一原處其源頭是從天命之性率性之道來聖人非有加於本分之外也中庸三達德説所以行之者一也九經又説所以行之者一也即一以貫之之道大德敦化小德川流溥博淵泉而時出之更分明畫出箇一以貫之來大學明明德功夫精一二字盡之中庸致中和功夫敬義二字盡之陳對初先生為少司成時一日詢及亦足以發亦字何著落或舉唐荆川文愚則疑其不足以發句曰非也亦字對違字不對愚字大凡有問難則有發明囘之不違疑其不足以發矣退而省其私亦足以發是他人之發也以口囘之發也以身夫豈真愚也哉語氣是如此顧小厓前輩云陰陽氣也一陰一陽乃道也若陰陽即道非不貳矣象山與朱子辨無極辨陰陽滔滔汨汨動以千言俱是強辨信通書而不信太極圖説可謂鈍矣按此言令象山亦當心折梁邨師嘗言儉與吝霄壤懸隔儉者薄於自奉吝者薄於待人望溪師言人子居喪三年不内寢不飲酒食肉名為士大夫有未能行者今既知之追悔不及却有補行之法每値親忌辰之月執行一月此心隱痛如居喪時則其性行必不浮薄此躬行最切要處高淳張彝嘆名自超窮經篤行望溪師之執友也彝嘆死師三月不入内寢或疑為過禮師曰若不如此平日之交皆偽情矣朱子嘗謂吾輩於貨色兩關打不透便更無話可説此須痛加深省而克治之危哉凢講學之功固為切要然言語太纏繞亦徒擔擱行之不力歸咎於知之未真夫知之未真容有毫釐千里之謬然理欲義利之大端如黑白冰炭之判然無難知者却難立得脚定其勝負消長只在一念之間朱子曰養其全於未發之前察其幾於將發之際善則擴而充之惡則克而去之其亦如是而已矣理之在心與在物直是徹内徹外故曰顯微無間程子纔明彼即曉此之語亦不得已下彼此二字耳其實絶無彼此之隔思至此不覺手舞足蹈姚江詆朱子論格物為求理於外物者真面牆之見也李中孚先生篤學力行近世罕比其書多汨於姚江之説其畫一下分善惡兩門分明是無善無惡心之體有善有惡意之動然其自作功夫與教人入門必從改過自新始豈不切實可師法乎李穆堂先生論配義與道云道與義必用氣配者當就人之身心言之心之裁制為義身所踐履為道未嘗集義養氣之人自反不縮嘗有心知其事之是非而不敢斷者氣不足以配義也亦有心能斷其是非而身不敢行者氣不足以配道也如此分配道義于氣之為用極為親切憶余同年友任宗丞翼聖云予私淑諸人也孟子未親受業於子思私淑諸人不止一人故不著其姓名葢即本夫子焉不學之意當時如子思所傳及所聞於公明儀公明高之類皆是也汪堯峯魏和公皆引郫人簡氏之説辨揚雄未嘗仕莽大畧謂傳言雄作符命投閣年七十一天鳳五年卒考雄至西京年四十餘自成帝建始改元至天鳳五年計五十年以五十合四十餘不將百年乎則傳言七十一者恐誤據桓譚新論雄作甘泉賦夢腸出收而納之明日遂卒成帝祀甘泉在永始四年謂雄卒是時恐亦未然就法言考之莽之號安漢公也在平帝元始間法言稱漢公且云漢興二百一十載自高帝至平帝正値其數則雄年七十一卒當在平帝末雄仕厯成哀平故稱三世不徙官若復仕莽詎止三世哉以是知雄決無為莽大夫及投閣美新之事云余友蔡次明駁之云按漢書孝成帝時客有薦雄文似相如者上方祀甘泉召雄待詔承明之庭正月從上甘泉還奏甘泉賦班固贊曰雄自序年四十餘自蜀來京師大司馬王音薦雄待詔歲餘奏羽獵賦幸甘泉為永始四年事長楊校獵為元延二年事則雄之待詔承明當在永始三四年也雄年四十餘官京師亦烏知其為四十九與四十一耶若以四十一當永始四年事則天鳳五年卒適當七十一歲安得從建始改元算至天鳳五年疑近百歲乎雄仕厯成哀平三世不徙官非謂雄厯官止三世也且當莽時雄已為大夫豈得云不徙官乎孟堅作史去雄歿纔四十餘年不應錯謬如是紫陽千秋直筆特書莽大夫豈其以訛傳訛漫不詳考誣千古之是非哉桓譚新論則無稽之言不足辨也乙丑中秋前一日同年友陳可齋寄到方望溪師病中與之札云知老生志事者莫如貫一與賢天幸兩賢並為聖主所特知望重自砥朂為國家擔當世教為天地保䕶生民各竭力所能致以歸潔其身並告同學諸君子平昔不病老生為迂闊者此札閲過即確寄貫一鋐捧讀之下寸衷傍徨唯深自愧奮誓不作一虧心之事以負期望至於力小任重則當自揣分量以為進退也易中先甲三日後甲三日先庚三日後庚三日諸説紛紜今得之少宗伯秦味經云甲者數之首造事之端也當蠱之時事已壞亂治蠱之道在於造始故取於甲先三日者辛壬癸也終而將始也後三日者乙丙丁也始而方新也天道循環否極復泰傳云終則有始是也中爻撰震位東有甲象庚者數之過中事之更變也巽以申命行事九五位居中正事當中而當變故稱庚先三日者丁戊己也數之過中而將更也後三日者辛壬癸也數之已更而將極也故曰无初有終吉中爻撰兑位西有庚象荀子言小人之學也以為禽犢子思言妄與不若棄物於溝壑伋雖貧不忍以身為溝壑我輩學問不為禽犢辭受取與不以身為溝壑否正好細自推敲近於同年友傅謹齋處得張楊園先生集讀之其言平正切實直接薛胡之脈先生諱履祥字考夫浙西桐鄉人曾受業於劉公念臺之門生明季學術龎雜時粹然一出於正陸平湖之學與之若合符節先生之言曰人只為貨色名勢四字敗盡一生秉彝之良人孰無之但是四者之中有一纏縛此身便不得直上須是斬截得盡方得身心浩然此語尢切中學者隱微深錮之病故特錄以自警庸庸碌碌作公卿不如山中作村學究心中浩浩無愧怍也憶李君卜京曾貽書云窮則抗談經濟達反空言性命按其事實毫無補於人世此雖以道學自命亦第矯於世俗之學而己似非聖人隱居求志行義達道之所為也此語真可作座右箴銘錄此以見良友規勸之益李君名鎬歸化人癸卯鄉試同榜丁巳進士陶淵明人第知其澹然忘世沮溺一流人進之則為不事二姓魯仲連一流人其曰脂我名車策我名驥千里雖遥孰敢不至又曰古人惜寸陰念此使人懼其汲汲不敢自逸者何也及讀詠貧士詩曰茍得非所欽曰所懼非飢寒曰朝與仁義生夕死復何求嗟乎此可以得淵明之真矣高忠憲公貶揭陽尉交蕭自麓先生潮陽人先生與公書云工夫不密内有游思則主不一外有惰行則儀不飭非敬也必須内外夾持積養深厚使此心無少閒雜斯謂能一斯謂真敬先儒曰此心有些罅隙便走又曰學貴含蓄深固最忌洩漏某嘗自思只用功不密洩露太蚤敬為執事論之毋若某之徒老而自悔也公嘆其語語破的奉以書紳戊辰五月偶讀昌黎雜著行難篇末子之言孟軻不如七字刪之則立言有體文法亦悠揚不盡易井改邑不改井道隨地而在也无喪无得不因人為加損也往來井井任人取之而不盡也汔至亦未繘井羸其瓶凶半塗而廢者是也程子之言簡而該其論天地曰天地安有内外言天地之外便是不識天地也曰凡有氣莫非天凡有形莫非地曰日月陰陽發見最盛處論仁曰仁者以天地萬物為一體曰觀天地生物氣象曰心如穀種生之性則仁也滿腔子皆惻隱之心論為學功夫曰心要在腔子裏曰敬勝百邪曰主一之謂敬無適之謂一曰整齊嚴肅則心自一一則自無非僻之干曰涵養須用敬進學在致知曰人能克己則仰不愧俯不怍其樂可知曰無妄之謂誠不欺其次也曰誠則無不敬未至於誠敬而後能誠曰有天德便可語王道其要只在謹獨論治道曰人主一日之間接賢士大夫之時多親宦官宮妾之時少則可以涵養氣質薰陶德性曰有關雎麟趾之意然後可行周官之法度曰天地生一世人自足了一世事但恨不能盡用天下之才此其不能大治曰韓信將兵多多益善只是分數明論異端曰聖賢以生死為本分事佛之學怕生死故説不休此等精言後世豈能出其範圍哉戊辰五月十九日訪河間王仲退名之鋭時為助教於國學偶論及此因識之人養心之所存則與天地相通徇身之所適則與禽獸為類艮其背不獲其身為忘我非忘我也廓然大公無徇己之念也行其庭不見其人為忘物非忘物也物來順應無徇人之念也内不徇己外不徇人私欲淨盡天理流行靜亦定動亦定何咎之有咸感也憧憧往來朋從爾思動而無靜也艮止也艮其限列其夤厲熏心靜而無動也動而無靜靜而無動物也動而無動靜而無靜神也物則不通神妙萬物周子之言至矣哉己巳三月十九日病起至月餘始漸愈病中看破生死關人之死如土委地何所留滯何所貪戀自病愈思之此禪學也吾儒存順沒寧得正而斃必平日仰不愧天俯不怍人本分倫常毫無虧欠始克全天之所以予我故曾子啟手足猶曰戰戰兢兢如臨深淵如履薄冰也朱子曰今日學者所謂格物却無一個端緒只似尋物去格如齊王因見牛而發不忍之心此皆端緒也便就此擴充直到無一物不被其澤方是凡人各有箇見識不可謂他全不知如愛親敬兄以至善惡是非之際亦甚分曉但不推致充廣故其見識終只如此須是因此端緒從而窮格之未見端倪發見之時且得恭敬涵養有箇端倪發見直是窮格去亦不是鑿空尋物去格按朱子格致補傳渾言格致功效昧者遂疑舍身心而格天下之物為支離又疑必窮盡天下之物而後知至而意誠將終身無誠意之日殊不思或問中格物之本末先後緩急言之鑿鑿今得此條即就善端發見處窮格推究則致知誠意正心修身一路通透尤為分明無人不可用力無時不可用力若尚疑格物為繁難其亦自諉而自棄焉已矣近見朱止泉先生答友云當應事時須靜定其心不得擾亂一有煩躁意便是主心不定此最切余之病余每作札答人多草率即是煩躁因錄以自警止泉先生諱澤澐寶應人用力朱子之學歿於雍正壬子余公車數過寶應而不知有先生其人也陋哉子游譏子夏之門人小子有末而無本子夏答之似教小子當先末而後本者其失均也天下事有本而後有末教小子灑掃應對進退所以收其放心養其德性即本也故朱子小學題辭曰以培其根以達其枝此安溪李先生之意可謂妙矣今由朱止泉答王豐川之言思之子夏未嘗與子游辨駁本末二字只説教人有先後有始卒因材造就不可躐等云爾初不粘着本末説然則子夏固未嘗先末而後本也小學之灑掃應對末也收其放心養其德性即本也大學之誠意正心本也見之威儀文辭即末也本末原分不得先後然樹必由根而幹而枝葉以小學大學分本末自當以小學為本大學即由小學而擴充以極其量耳孟子以仁義禮智為體惻隱羞惡辭讓是非為用朱子注太極圖説又以仁與中為用義與正為體南軒累相辨難今思之天之元亨利貞體也著之為春夏秋冬用也就元亨利貞分之則貞下起元貞又為元之體也就春夏秋冬分之冬氣斂藏而後春氣發舒冬又為春之體也朱子以仁與中為用義與正為體正如春夏發舒為用秋冬斂藏為體耳以靜為體以動為用程子所謂不專一則不能直遂不翕聚則不能發散也必隨事隨物處置得宜而後此心安焉事物之理與心之理豈有内外之分乎然必心有定主而後隨事隨物處置得宜則不可不明體用之説也朱止泉先生云事物之理即至善之所在至善之所在即天命人心之本然朱子生平用力格致者惟此此與安溪文貞公所謂大學之格物中庸之明善孟子之知性一也皆可謂破的之論成得一人品未有不從刻勵中來仲退王君述安溪文貞公自言某少年時言行有大覺錯誤處深自憤恨至不能解輙自取手板痛自擊撾方覺心中稍安文貞公理解精融人只嘆其穎悟性成孰知其内自刻勵如此然則茍且自安未有不墮落下流者矣仲退又述文貞公語云不誠無物人作事纔有私欲參雜作得事便減分數朱子曰人心有絲毫私欲未盡皆足以敗事正為此也高忠憲公疏云人心至活倐忽之間起滅萬狀未有無所事事而能懸空守之者故必觀經書以求聖賢存心養性之道觀史鑑以求古今治亂興亡之原君子小人立心行事之别又必時召侍臣相與講説討論以求治國平天下之要如是則一日之間此心常止於義理人欲不得而乘之心有所止則靜心靜則氣和氣和則喜怒皆中節而刑罰不過其則此公為君上言之儒生之學豈有異乎所謂觀經書以求聖賢存心養性之道觀史鑑以求古今治亂興亡之原君子小人立心行事之别一也在儒生則親師取友以求修己治人之要其講習討論亦一也凡此皆致知之事然非心有定主志有定向能然乎用心於此而不外馳則所存自熟是涵養致知分不得兩截也知之真則行之果守之固知水火之不可蹈則必不蹈矣知穿窬之不可為則必不為矣人固有揺奪於利害禍福之界者知之未真也知舍生取義則不為利害禍福所揺奪矣是致知力行亦分不得兩截也公謂人心至活倐忽之間起滅萬狀未有無所事事而能懸空守之者此尤切要之言然則公每焚香靜坐坐必七日者固可不必如此懸空守之矣公疏又云陛下常提此心保而勿失擴而充之每事皆然今日如此即今日之堯舜也明日如此即明日之堯舜也堯舜之道至易至簡言之似迂闊行之實無難我輩即以責難於君者返而自責常提此心保而勿失擴而充之每事皆然今日如此即今日之程朱也明日如此即明日之程朱也程朱之道至切至近言之似迂闊行之實無難我輩不敢希孔子并不敢言顔孟豈不當學程朱乎此心之理即天地健順之理此身之氣即天地陰陽之氣此形骸軀殻亦即天地之渣滓耳渣滓有盡而理氣無盡是故生而必死死而必化者渣滓也理氣則與天地泯然無間矣後世不講學者愚不肖之不及講學者多賢智之過乃知夫子言道之不明不行己舉萬世之流弊而括之矣講學不必言心言性即如弟子入則孝一章切實力行下學而上達在其中矣論語中罕說心字無處非心即如弟子入則孝一章非心念專注能身體而力行乎後儒陸王之流弊終日説心心却空了盍思以顔子之穎悟夫子只教以非禮勿視聽言動此踐形也踐形所以盡性也徹上徹下徹内徹外不待他求矣易乾卦足包全易故文言中更互演繹不厭其詳即此見夫子韋編三絶之意地以天為主妻以夫為主臣以君為主地必承天之施妻必順夫之意臣必聽君之命故曰先迷後得主彖傳曰後順得常文言更申之曰後得主而有常得主所以順也以一身言之心君也百體必從心之令若心為形役則肆欲妄行所謂先迷失道也屯卦以人事言之初九如郭子儀也九五如唐肅宗也肅宗必建侯如郭子儀始足以濟險其自處之時地固小貞吉大貞凶也若一旦大易明皇之人與政豈不傷父之心而為大貞凶乎肅宗若有大本領必為之以漸轉移於不覺使明皇心中釋然而後可初九之磐桓六二之屯如邅如六三之君子幾不如舍皆勿用有攸往意葢濟險不可以輕動也䝉九二之包䝉納婦以尊統卑也䝉有在上者六五之童䝉在臣子則不可以䝉視之故變其文曰子克家六三獨不言䝉言勿用取女因九二納婦為言也若䝉則敗度敗禮不可教訓矣曰發䝉曰包䝉教者之事也上九曰擊䝉古之教者所以移之郊遂也凡客之自我速者我先有敬之之心不速之客出於意外况三人紛至尤易生慢敬之終吉敬心無往而或失以此濟險其庶㡬乎世人挾好勝之心以不克訟為耻唯九二九四以剛居柔乃能内斷於心甘讓於人用兵而不好勝此其義也雖然既用兵矣而不好勝毋乃晚乎所以君子貴作事謀始内地之撫綏外國之控制得其人得其道則兵端不作輿尸當從程傳如晉邲之戰荀林父將中軍先縠不用命以致敗績又如唐九節度之師權不歸一是也若謂師徒撓敗輿尸而歸則凶而無功不待言矣凡兵端必自小人開之故上六功成之日以小人勿用為戒非必謂有功之小人葢古者將兵即卿大夫非如後世文武分途市井勇力之夫皆得充行伍任將帥也比卦九五一爻想見王者皥皥氣象全無智取術馭之意李文貞公觀彖中言之可謂純粹精矣比人之道判在公私公則誠心相與唯賢是親斷不至於自失縱或知人之難偶受人欺然吾所以交之者初無曖昧之私無不可共白於天下若名利之間稍有沾滯始之不慎後悔難追匪人之傷其能免乎凡言復者返其本位也小畜初九之復自道九二之牽復皆不輕進之意九三鋭意輕進故有説輻反目之傷仕宦功名之際退步便安穩躁進之人必不足以立事六四積誠以孚於上九五推誠以孚於下故皆曰有孚君臣之際離間易生故血去惕出上乃合志九五有孚攣如富以其鄰則上下合德衆正一心庶不為小人所間然而臣罔以寵利居成功故上九既雨既處即有征凶之戒矣履九五一爻所謂剛中正履帝位而不疚者也爻辭則曰夬履貞厲傳曰夬履貞厲位正當也位正當而有貞厲之戒此所謂懼以終始其要无咎也凡人行事必視其所終故至上九而後曰視履考祥其旋元吉泰上三爻主下交之義至上六以治極而亂為戒否上三爻則不主不交之義而惓惓於撥亂反治焉此聖人轉移造化之心也且泰之九三即有戒辭而否之九四乃言有命從治而亂易從亂而治難此二卦精義文貞公觀彖通論二書中剖洩盡矣泰之功歸於上故曰后以財成天地之道輔相天地之宜以左右民否之時上無可言故曰君子以儉德避難不可榮以祿同人曰君子以類族辨物此韓信將兵多多益善只是分數明也大有之六五所謂柔得尊位大中而上下應之者也猶恐其易而无備至上九而後曰吉无不利此與履卦同義謙卦皆吉辭豫卦多戒辭聖人之情見矣隨卦甚難明白竊意卦以相隨取義陰隨陽正也陽隨陰變也彖傳剛來下柔初九與六二相隨則變其常而陽隨陰也正剛來下柔之義故曰官有渝貞吉出門交有功六二與初九可相隨者也若隨六三而失初九則為係小子失丈夫小子指陰丈夫指陽六三隨九四不隨六二則為係丈夫失小子故曰志舍下也九四之隨九五九五與上六固結而不解皆以相隨取義也九五又合剛來下柔之義君父兩倫並重蠱言幹父之蠱則幹君之蠱可知雖然子無不與家事臣則有不與國事故上九變其文曰不事王侯夫潔身亂倫君子所不取而樂行憂違義自各有當葢不貶道以徇人故曰志可則也臨十二月之卦也而即危及八月有凶八月四陰之月過此則為剝矣九二象傳未順命即君子不謂命意觀九五之觀我生觀民即本諸身徵諸庶民也上九事外之賢觀其生觀九五也如伊尹之於湯傅説之於高宗是也志未平者未敢安然無事也噬嗑九四得金矢金斷也矢直也斷而直恐失之過故必利艱貞六五得黄金黄中色斷合於中則直不待言矣必曰貞厲无咎用刑之道不敢以易心處之也賁卦取文飾之義而實懼文勝故六五束帛戔戔吝終吉上九白賁則无咎雜卦曰賁无色也剝復二卦正人心道心勝負之機也剝至六四為切近災則六五之災不待言矣而變其文曰貫魚以宮人寵无不利葢即後得主之義小體從大體則變凶而吉矣禍莫大於迷復故復於上六切言之无妄剛自外來而為主於内即道心為主人心聽命也凡人學問經濟忌發露太早故大畜六四六五皆以畜陽為義畜極必通畜之正所以通之也頥下三爻在下位為自養以求人所以皆凶上三爻在上位為養人以求人所以皆吉大過棟橈之時巽而説可利有攸往而亨然大象則曰君子以獨立不懼遯世无悶其危行言孫之謂歟坎卦六爻無一吉辭何也曰處險中得无咎焉足矣水小則不足以濟過大則有潰決之虞九五坎不盈祗既平得中道也象傳曰中未大者中不自大正處險之道也離九三言日昃之離則六二為日中之象九四其昏夜之象矣六五其復明乎而上九正重明之義易以妄動為戒故咸卦主於感而六爻仍以靜為吉戒妄動也恒卦僅九二得悔亡其餘皆不合恒義甚哉恒不易言也然不恒則凶恒而以順為正如婦人亦凶則恒之為義可得矣剛當位而應與時行也奚可言遯曰此所謂不以寵利居成功九五嘉遯貞吉者也小利貞則不可大事當見幾而作矣恒九二悔亡能乆中也大壯九二貞吉以中也剛而得中無往不吉大壯九三小人用壯君子則以過剛為戒罔有恃壯之心故曰君子罔也晉卦柔爻皆吉仕宦而萌欲速躁進之心者當思此義初六摧如貞吉有摧之者而自守以正也罔孚裕无咎如濓溪初不見信於趙清獻是也六二愁如貞吉謂心以進為愁恐任大責重而不能勝也六三衆允悔亡如韓魏公初不令蘇子瞻知制誥是也明夷六四一爻本義中推闡殆盡而猶曰此爻之義未詳慎之至也竊意六二爻夷於左股其傷尚淺馬壯則避之速也六四謂入於左腹傷已深矣然於明夷之心尚未害也惟有於出門庭逺去而已六五則義不可去如箕子之明夷所謂利艱貞也葢依本義獨上一爻為闇君則其義可推而通家人九五王假有家自是感格一家故曰交相愛也一家皆感格有不交相愛者乎睽九二則尊六五為主六五則倚九二為宗睽而不睽矣六三之見上九之見皆積疑所致虚象也疑釋則睽合故六三无初有終上九遇雨則吉雨者陰陽和所致謂六三與上九合也故曰羣疑亡也處睽之時无咎為幸故至上九羣疑皆亡而後曰吉蹇至上六乃有吉辭義同蹇卦本義甚分明觀彖中來連異解不可從六二之王臣蹇蹇與遯之六二皆身在局中者也唯有鞠躬盡瘁成敗利鈍非所論也故二爻不言吉凶解卦六五有孚於小人小人亦信其不可干以私也天下最當損者在心則忿也欲也在身則疾也在家則貨殖也在人則泛泛無益之友也損卦備言之矣見善則遷益也有過則改損也損正所以為益也六二王用享于帝吉帝之於王自上下下也六三益之用凶事動心忍性是也凡遇此者内積孚誠行合中道庶幾有益損下益上不必損下而自益上上九與九二同上九得臣无家但得臣不以肥身保家為事所益於上大矣損上益下上九莫益之不以益下為事則悖入必悖出或且擊之矣豈無愛民之心哉立心勿恒故凶夬居德則忌葢施祿及下理當然耳自居為德深可忌也夬上六无號與九二惕號反對惕號則有戎勿恤无號則終有凶以一小人為不足畏如趙汝愚之於韓侂胄是也姤九四包无魚逺而不能制之也象傳曰无魚之凶逺民也自我逺之惡得不凶萃用大牲吉承王假有廟假有廟而可用大牲也利有攸往承利見大人見大人而所行自利有攸往也六三象傳上巽也本義無解疑此是互象六三承九四九五二爻為巽六三與上六陰柔不相應故嗟如无攸利惟上巽而萃於四有相比之義往旡咎也然以下求上亦小吝矣升卦之義觀彖中最當詳玩與晉卦互相發明處困之時唯有積誠以自靖九二之利用亨祀九五之利用祭祀皆積誠之謂也困於酒食困於赤紱祿位在身進退不得自如為困也九二朱紱方來在下位也九五劓刖見傷於小人困於赤紱則已在尊位也井卦九五爻不言吉上六有孚元吉即終九五爻義天下更變之事必人皆信服而後可行革卦盡之矣大有元亨尚賢也鼎元亨養賢也觀彖之義精矣大有曰順天休命鼎曰正位凝命賢為帝心所簡在能尊賢則合乎天心故足以順命而凝命也咸以動言艮以靜言若動而不獲其身行其庭不見其人豈得无咎唯寂然不動未與物接此心退藏於密不動念於一身不動念於應物是為止其所也彖傳中是以二字極分明上下敵應不相與正未與物接也又按時止則止時行則行合動靜言艮其止以下乃就艮卦説此卦今熟讀彖傳覺當如是行其庭行者人也我未與之接是以不見也即不憧憧往來意漸止而巽進以禮也歸妹説以動動以欲也豐明以動可謂盛矣而君子以為憂故戒以勿憂而勉以宜日中此與泰九三參看旅以過剛為戒而過柔亦瑣瑣可耻故二五得中為貴卦莫善於既濟然彖與六爻皆有戒辭聖人之意深矣玩一既字可不思患而豫防乎與泰九三參㸔未濟有可濟之道故亨然如小狐汔濟濡其尾則无攸利小狐多疑不斷人而如是何足以濟乎初六陰柔居下不足以濟九二可濟而不輕濟如諸葛公必待三顧而後出也六三陰柔不中正何足以濟必以剛克之故曰利涉大川九四剛而不過乆必有功故曰三年有賞於大國六五虚中如劉先主於孔明可謂君子之光有孚吉矣上六濡其首為既濟而不出者戒也上九濡其首為圖濟而過涉者戒也乾坤之用在水火坎離乾坤之交故以既濟未濟終焉以上論易皆己巳假歸舟中讀本義心有所疑無他書參考隨筆記之中多前人説過者非敢襲為己有也易道無窮原難執一古人學與年進余年已逾艾惜哉晚矣自記讀書偶記卷三卦莫善於既濟然彖與六爻皆有戒辭聖人之意深矣玩一既字可不思患而豫防乎與泰九三參㸔未濟有可濟之道故亨然如小狐汔濟濡其尾則无攸利小狐多疑不斷人而如是何足以濟乎初六陰柔居下不足以濟九二可濟而不輕濟如諸葛公必待三顧而後出也六三陰柔不中正何足以濟必以剛克之故曰利涉大川九四剛而不過乆必有功故曰三年有賞於大國六五虚中如劉先主於孔明可謂君子之光有孚吉矣上六濡其首為既濟而不出者戒也上九濡其首為圖濟而過涉者戒也乾坤之用在水火坎離乾坤之交故以既濟未濟終焉以上論易皆己巳假歸舟中讀本義心有所疑無他書參考隨筆記之中多前人説過者非敢襲為己有也易道無窮原難執一古人學與年進余年已逾艾惜哉晚矣自記讀書偶記卷三
