body:
  text: 讀書偶記儒家類提要臣等謹案讀書偶記三卷國朝雷鋐撰鋐字貫一寧化人雍正癸丑進士官至副都御史是編乃其讀書劄記大㫖惟以朱子為宗然能不爭競門户如卷一中一條云古人心最平如孟子謂夷惠隘與不恭君子不由而又謂其為百世之師是也後世如陸子靜王陽明陳白沙論學術者必辨之謂其非孔孟程朱之正派也然其砥節礪行以之針砭卑鄙俗夫不亦百世之師耶其持論特平較諸講學之家頗為篤寔無客氣書中論易㡬及其半大致多本李光地其論禮則多本方苞一則其鄉前輩一則其受業師也所記方苞駁蘇軾一條引曾子問及檀弓曾申之事謂親在不妨學喪禮乃國初汪琬與閻若璩以論禮詬爭琬以是攻若璩若璩援以駁琬者其始末具見若璩潜邱劄記中苞殆偶述舊文而鋐誤以為師説葢當鋐在時潜邱劄記尚未出故未見也惟太極一圖經先儒闡發已無剰義而繪圖作説累牘不休殊為支蔓夫人事邇天道逺日月五星有形可見儒者所論自謂精微推步家寔測騐之其不合者固多矣况臆度諸天地之先乎是則不免于習氣耳乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:04075880d691d262c3acda2606d697792fb9d0523faa6e82093d549d2596779c
