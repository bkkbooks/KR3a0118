body:
  text: 讀書偶記卷一副都御史雷鋐撰李貫之得力喚起截斷四字頻喚起真心敬以直内之要也每截斷私念義以方外之本也黄勉齋語何基曰為學必有真實心地刻苦功夫基悚然服以終身吾輩勉旃劉器之從司馬公得不妄語三字終身行之拳拳勿失家居未嘗有惰容乆坐身不傾倚作字不草書我輩學做人當從此做去朱子與何叔京云人心無形出入不定須就規矩繩墨上守定便自内外帖然按此是講學第一𦂳要處小學一書所當服膺踐履沈闇齋先生來梁邨師寓園余請教先生云讀書最怕浮淺朱子一生於四子書自注自讀斃而後已此其沈潛深造何如也又曰研求義理却不可穿鑿只用朱子斂身正坐緩視微吟虚心涵泳切己體察十六字去讀聖賢書自有所得張長史言西銘有一直一横之理直上是父母横去便是兄弟直上是祖宗横去便是族姓直上是天地横去便是民物因其横出兩旁者皆與我自直上生來故須窮到上頭方纔筦得兩邊住也李文貞公極取其論精切因畫為圖而申之曰人能以父母之心為心者未有不能愛其兄弟者也能以祖宗之心為心者未有不能收其族姓者也能以天地之心為心者未有不能仁及民物者也如樹之根深則其蔭必大如水之源逺則其滙必多緣是枝葉流派皆與我同其源本故也愛兄弟族姓便是祖宗父母之心故惟心祖宗父母之心則不患於無愛矣生民物便是天地之心故能心天地之心則不患於無仁矣西銘先言乾父坤母民胞物與而自後但言事天之道不及兼愛民物之事葢全乎心之德則愛之理在其中矣程子以為意極完備乃仁之體朱子又謂訂頑之訓示我廣居張生之論深得其㫖云圖附於左張長史論無欲故靜云人知靜故無欲而不知夫無欲故靜也知靜故無欲則必專其功於靜此釋老之學也知無欲故靜則必如聖門所謂戒謹恐懼以完其未發之中者而後可此吾儒之學也李文貞公謂此論極其精切自中庸首章艮卦彖辭及太極圖說定性書皆當以此意求之長史諱昺辛未進士陸稼書先生為御史部議充發時堅請執贄為弟子者也沈闇齋先生云洪範雖載在周書其實二典三謨尚屬史臣追述紀錄之書洪範則禹當堯舜時治水功成自作之書皇建有極即執中也五事曰敬用即一欽字也五行五紀則厯象日月星辰察璿璣玉衡以齊七政皆統是矣八政則咨岳命官以亮天工皆統是矣乂用三德此黎民所以於變時雍從欲以治也稽疑庶徵人與天地鬼神感召無間此非極深研幾者不能知五福六極則惠迪吉從逆㓙不外是矣推之臯䕫稷契仲虺伊傅周召所言天德王道皆不能出洪範之範圍大哉是書天人性命道德政事一以貫之矣又曰春秋惜未經朱子手注然以朱子作綱目之意推之大抵朱子註時必以經為綱三傳採其足信者為目先儒之論有合聖人之㫖者為斷先儒所不精不詳處則以己意折衷之此非道不足而強言者可庶幾也又曰周公之德容於赤舄几几處最可涵泳想像程子云其處己也䕫䕫然存恭畏之心其存誠也蕩蕩焉無顧慮之意此二語寫出聖人心事氣象某思孔子微服過宋即䕫䕫然存恭畏之心其曰天生德於予桓魋其如予何即蕩蕩然無顧慮之意其並行不悖之妙非知道者孰能識之學者能戒懼慎獨中有不愧不怍之意焉斯近之矣又曰讀一書沈潛玩味乆之自有超然自得處一友讀吾十有五而志於學句終日玩索不置或曰此何須終日功夫乎曰聖人直做十五年功夫吾一日玩索豈能盡乎葢十五年不是空抱一志朱子註云志乎此則念念在此而為之不厭矣從此便恍然見得聖人發憤忘食樂以忘憂處有神遊意㑹不知手舞足蹈之妙又曰讀書至熟後自有天然通貫處如太極圖說分明是中庸首章無極而太極至真精妙合萬物生生處即天命之謂性也惟人也得其秀而最靈至萬事出矣即率性之謂道但子思專以理言周子兼氣言耳聖人定之以中正仁義而主靜立人極焉此修道之謂教也君子修之吉則戒懼慎獨致中致和皆在是矣立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義人與天地原是一體此所以致中和天地位萬物育也西銘分明是孟子盡心一章父乾母坤胞民與物盡乎此心之量矣知天地之塞吾其體天地之帥吾其性此知性知天之實也于時保之至潁封人之錫類皆言存心養性以事天也不弛勞而底豫至存順沒寧則夭壽不貳修身以俟所以立命者至矣又曰宋豫菴先生講大學格物致知即接弟子行有餘力則以學文深言之即格物致知之事以年力分淺深耳豫菴名瑾湖州人梁邨師云讀詩之妙不可以言喻如常棣之詩和樂且孺一孺字試思孺子嬉戯之時兄弟間全是一團和氣今言兄弟終身和樂依然孺子天性之真此景象可以言盡乎又誦小宛之詩曰我日斯邁而月斯征夙興夜寐無忝爾所生兄弟之相規相勉也又如此闇齋先生曰三百篇中周召以後學問之深切純邃者其衞武公乎淇澳之詩大學引以明明明德之止至善抑戒之詩中庸引以明存養未發之極功皆不作第二義㸔梁邨師曰觀抑戒中自寢興洒掃之細推之車馬戎兵之大自出話威儀之著斂之爾室屋漏之微殆有合乎體用一原顯微無間之㫖矣其警策切至痛自鍼砭又見其進德之功老而彌篤武公其賢而希聖者也外此其尹吉甫乎天生蒸民有物有則民之秉彜好是懿德非通於性命之學者烏知此師又云詩人言天極其精切維天之命於穆不已此君子法之以自強不息也無曰高高在上陟降厥士日監在兹昊天曰明及爾出王昊天曰旦及爾游衍此道之所以不可須臾離也又曰讀春秋勿徒視為行事之迹此聖人修道之教也其原是從天命之性率性之道來某思讀春秋知通於性命讀易能體之行事乃為有得所謂易本隠以之顯春秋推見至隱也見音現梁邨師與益都令柬云願益勵誠心更宏逺謨舉平日所必欲為與所誚他人何故不為者從容順布之程張大儒曾為縣令其所設施豈無可效法者乎又云當官處事最要誠又要至虛誠則以心感心而人化之虚則無先入之見横於中而所行悉當又曰無益酬應及事上之費最當節何從得來且何所懾縮擔當大任出之以謙約小心綜理繁劇處之以周詳整暇籌度事機甄别人物加之以廣諏博採内則贊襄主治外則體恤民隱本之以至誠愷切至於清心寡欲澹泊寧靜則尤養之有素如是斯可以為大臣矣水陰盛金陰穉水陽穉木陽盛火陽盛木陽穉火陰穉金陰盛太極圖以水陰盛故居右火陽盛故居左金陰穉故次水木陽穉故次火下文却説水木陽也火金陰也却以水為陽火為陰勉齋黄氏葢嘗疑之謂如此則水為陽穉木為陽盛火為陰穉金為陰盛也愚按二者似不相符而實一貫葢水陰根陽此陰盛而陽穉也至水生木則陽盛矣木生火則陽極其盛而陰生矣以火而較之木則謂木為陽穉火為陽盛可也火陽根陰此陽盛而陰穉也至於生金則陰盛矣金生水則陰極其盛而陽生矣以水而較之金則謂金為陰穉水為陰盛可也李文貞公云圖解所謂生之序行之序者當善觀之意當云推其所由生則水木陽也火金陰也指其所自盛則木火陽也金水陰也生之序與行之序皆然如此則四時之分明五行之性得而於朱子之意亦不相悖矣按此可謂冰解的破矣其於朱子之意不相悖者河圖解生之序則曰水木陽火金陰者就質而推其所由生也行之序則曰木火陽水金陰者就氣而指其所自盛也若就質而指其所自盛則謂木火陽金水陰亦可也就氣而推其所由生則謂水木陽火金陰亦可也喬南劉公諱蔭樞當代名臣也余見其八十六歲手書一幅云凡人於衣食享用見天下不如己者甚多則氣平自不至怨天尤人於道德學問見古今來勝我者百倍則心虚自不至傲世凌物又八十七歲手書二幅其一云人之處世常懼為人愚夫受人愚者偶然之失未足患惟人而自愚乃足患也惡積而欺人耳目德喪而思邀名譽黷貨徇財剝人肥己智取術馭欲厚積多藏傳之子孫愚乎否耶故曰人愚者其患小自愚者其患大其一云江河東注亘終古而不息水從何來必有生其生者滄海納流合百川而不溢水從何往必有受其受者三幅皆王蓮洲御史持以相示余求一幅珍藏之復錄此以資警戒之益且以見正人君子之表見於世非無所本而能然也一念之惡推究到極墮落處一事之差推究到不可收拾處戒懼謹獨之功自不容己愚初於河圖執五行之説參之先天八卦絶不見契合處繼乃得李文貞公河圖論謂陽始於北而盛於東消於南而終於西故在圖之竒數則北東居内而南西居外也陰始於南而盛於西消於北而終於東故在圖之耦數則南西居内而北東居外也内者主之位也外者賓之位也得位為主而用事則日進而盈失位為賓而不用事則日退而虚以邵堯夫八卦之位觀之則自震之一陽厯離兑之二陽以至於乾是左方之卦皆陽内而陰外無異乎河圖之左方也自巽之一陰厯坎艮之二陰以至於坤是右方之卦皆陰内而陽外無異乎河圖之右方也以是觀之可無疑於聖人見圖畫卦之由矣邵子坤復之間乃無極即周子主靜之意故朱子注太極圖説曰靜者誠之復而性之真也帝以主宰萬物者也故易言帝出乎震又言萬物出乎震也巽離坤兑坎艮莫不兼帝與萬物言惟乾不兼言萬物乾即帝也所以握萬物之機軸者也程子所謂以形體言謂之天天地定位是也以性情言謂之乾乾君坤藏是也以主宰言謂之帝帝出乎震是也以妙用言謂之神神妙萬物是也其實一天也夫天專言之則道也其實一太極也此自周易折中發出見先儒之言精密切至如此官瑜卿云乾君坤藏易以乾健坤順證以西銘注極確梁邨師云耳目口鼻心知百體皆由順正以行其義程子所謂主一無適整齊嚴肅皆統是矣西銘一書示人以實踐天理之綱領也小學一書示人以實踐天理之節目也闇齋先生云論語成於樂註云蕩滌其邪穢消融其渣滓邪穢以物欲言也渣滓以氣質言也學至物欲不累氣質無疵則純粹精矣方可云成雍正丁未十一月初十日夜半睡覺思上蔡言敬是心常惺惺法常自提撕喚醒斯常惺惺常惺惺則天理人欲之幾一萌即覺天理即可擴充人欲即可遏絶矣時梁邨師齋戒外寢因請問師云常惺惺涵養而兼省察在其中矣由此而加克治之功自易為力余又曰返躬切己不敢不勉深思自得甚難言也師云學之自得亦即在返躬切己處來過求深思反多走作梁邨師云鄙薄之害甚於頑懦去鄙則高明去薄則仁厚又云讀書而至心得行事而至慊心天下之樂孰過於此又云人以行禮為難比之謀利求人何如勤於彼而畏於此何居是所望於有志者又云冠昏喪祭有朱子所定家禮在簡而易行或曰俟吾得志而後為之將思大烹而輟蔬食乎性命事功原分兩橛不得如人得天地生物之心以為心此仁也性命之精也仁則以不忍人之心行不忍人之政所以撫字之教導之懲戒之奬勞之皆此心自不容己處流出有口談性命及居官理民全無展布者遂謂有體無用竊疑心源中原未裕也不然如萬斛源泉如何壅遏得住從烈火中鍛鍊過方見真金從顛沛患難中閲厯過方見真人品世有清操雅望及居大位反覺退縮緘黙者每自諉曰時勢不同恐只是顛沛患難關頭打不過耳方望溪先生云伊川治司馬公之喪蘇子瞻譏其大中公尚在何嫺熟如此是謂父母在不可讀喪禮乎不知曾子當孔子沒時曾晳尚在禮記曾子問中其於喪禮悉矣曾申曾子之子也檀弓載申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食云云是父子間且不以父母之喪為諱蘇氏之譏適自形其淺陋耳一刻不持重便害德性一刻不專一便荒本業一刻不警惕便墮宴安宴安溺志則害德性荒本業不待言矣勿作功利馳逐人亦勿作山林閒散人或出或處俱有本分内事也朱子答任伯起書云示喻靜中私意横生此學者之通患能自省察至此甚不易得此當以敬為主而深察私意之萌多為何事就其重處痛加懲窒乆之純熟自當見效不可計功於旦暮而多為説以亂之也按此是下手功夫最切要處蟬蛻人欲之私舂容天理之妙此語宜常自涵泳著實功夫只是克己復禮朱子答李處謙云凡日用間知此一病而欲去之則即此欲去之心便是能去之藥按此當下指㸃最是警省用力處西門豹處置河伯娶婦一事最妙巫嫗三老之罪投之河中不為過破愚懲奸不言而喻若徒以文告曉示之不濟事程明道佛首放光一事處之不動聲色善處事人大抵如此李正已表獻錢三十萬緡德宗欲受之恐見欺卻則無辭崔祐甫請遣使慰勞淄青將士因以錢賜之趙德明求糧百萬斛大臣難之王旦請敕有司具粟百萬於京師詔德明來取此皆處事動合機宜處鄒浩以諫得罪見田晝而出涕晝正色責曰使志完隱黙官京師遇寒疾不汗五日死矣豈獨嶺海外能死人哉此一段令人雒誦擊節足以亷頑立懦召信臣為民興利務在富之躬耕勸農出入阡陌時行視郡中水泉開通溝瀆起水門提閼凡數十處以廣灌溉作均水約束刻石田畔以防分爭禁止嫁娶喪葬奢靡務出儉約尹翁歸治東海郡中吏民賢不肖及奸邪罪名盡知之縣各有籍收取黠吏豪民案致其罪懲一警百吏民皆恐改行自新皆吏治最要處由此而興學校敦禮讓奬節孝厚風俗其為治也易易矣保甲最宜核實力行平日稽查賊盗賭博饑荒則按户計口賑濟不致為胥吏朦蔽即一邑中必有修身敦行者亦必有恃強好訟鑽刺無耻者不知勸懲何治之足云為守令當不時巡察牢獄須二三更至一則不致獄吏横加拷掠一則不致囚犯私自逃竄其房宇每日命獄卒掃淨一次每月為換一草薦使得安寢縲絏却不得寛縱牆壁尤須周視嚴密張旻為馬軍副都指揮使被㫖選兵下令太峻兵懼欲變真宗召二府議之王旦曰若罪旻則自今帥臣何以御衆捕兵則震驚都邑今但擢旻使解兵柄反側者當自安矣王公善處事類此愚謂此亦張旻無大罪不過下令太峻耳兵中首亂者亦不可無以懲之王沂公嘗語人曰昔楊文公有言人之操履無如誠實吾每欽服斯言茍執之不渝夷險可以一致按此是立身居官第一要着范文正公條上十事擘畫精詳但不及明道先生十事之規模宏逺葢明道首重師傅以君德為治天下之本此范公本領不及處君志未定遽更法度易為小人所撓故范公知政事纔一歲而罷所施行亦遂為有司奏罷大抵後世名臣不及伊傅周召者只在格心一著事業無以復三代之隆皆由此也近日方見呉康齋遺書其刻苦自勵處可為百世之師平實切要胡敬齋得其傳而光大之者也陳白沙亦出康齋門却以清虚自然為宗何也朱子云致知不以敬則紛惑昏擾無以察義理之歸力行不以敬則怠惰放肆無以致義理之實此朱子喫𦂳為人處二月朢後卧病二旬夫人病則畏死自念死生有命但可惜二十歲以前既浮沈過日二十歲以後稍知悔悟亦為善未純去惡未盡於此而死殊為枉過一生今病稍痊宜切實用力庶失之東隅收之桑榆也戊申三月初六日記貧苦菜傭所持不過數百錢為終年營生之計我輩家本清貧不知十分撙節如耐不得徒步而欲乘車馬耐不得布素而欲服絲羅耐不得菜根而欲食魚肉此在世家富室尚為不能惜福况窮秀才出身者乎處京師中尤易蹈此切戒讀朱子語類云須磨厲精神去理會天下事非燕安暇豫之可得因思平日因循頽惰忽過光陰殊堪痛惜今不努力直下愚而已周易折中云乾坤之元亨利貞諸儒俱作四德說惟朱子以為占辭與他卦一例當矣然四字之中雖只兩意實有四層何則易之中有言小亨者矣有言不可貞者矣惟有大者存焉而後其亨乃大也是大在亨之先也惟有宜者存焉而後可以固守也是宜在貞之先也其在六十四卦者皆是此理故其言元亨者合乎此者也其但言亨或曰小亨者次乎此者也其言利貞者合乎此者也其言不可貞勿用永貞或曰貞㓙貞厲貞吝者反乎此者也乾坤諸卦之宗則其亨無不大而其貞無不宜文王繫辭備此四字故孔子推本於天之道性之蘊而以四德明之實所以發文王之意且以為六十四卦詳略偏全之例也按此是讀易開篇第一要義朱子所未及剖發者也天德不可為首李文貞公周易觀彖云言天之為德渾然不可見其端始也用九者陽變為陰動根於靜故在天者陰陽則無始動靜則無端在聖人則寂然不動感而遂通天下之故皆不可為首之義也按此與見羣龍元首皆作無端無始解最妙文言乾卦言學聚問辨寛居仁行坤卦言敬以直内義以方外千古講學之要㫖不出乎此韓魏公詩須臾慰滿三農望斂却神功寂若無林次崖引以説乾始能以美利利天下不言所利甚妙余初讀坤卦初六一爻本義既云陰陽者造化之本不能相無又云其類有淑慝之分竊疑似是兩樣説話矣後讀周易觀彖云天地者萬化之源也然天統神地統形則有陽明陰濁之分焉在人則神者心也形者體也心通極於性而體交引乎物則是化物之端自體始也故心為主則形為神役而萬善以生體為主則神反為形役而衆惡以起惟聖賢者心常為主而百體從令焉則人欲皆化為天理如渾然天德之流行而地以順承而與天合陰變為陽而以大終矣孟子大體小體之義葢出於此又推之人類則君子小人之内外消長自此分君臣父子之否泰順逆自此辨葢皆自其不可相無之中而必謹其主役君民之分察其向背離合之情幾微之差則陰慝作而天命有所不行馴積之甚則陰道肆而天理或幾乎熄矣此六十四卦冒天下之道者其義悉自乾坤來也按此則陰陽淑慝之所由生者見而先迷後得主之義益以豁然周易折中及觀彖於坤之文言明乾坤之學誠敬兼體之功不可不潛玩而切體之習氣根株未剗盡夢中尚有不堪告人處此克己之未力亦無涵養本原之功故也四月十三日夏日讀易掩卷稍息登臨泉石間口占云柳陰拂沼倚風斜鳥啄殘紅噪碧霞猶憶早春冰尚凍含菁萬木未蕃芽古大人之淵渟嶽峙玉蘊珠藏大抵皆凝靜中蓄養來氣象不凝靜則浮動多而德器輕矣君子以果行育德行不果則頽惰而無振作之氣德不育則浮露而無培養之功自戒懼而約之以至於至靜之中無少偏倚而其守不失自謹獨而精之以至於應物之處無少差謬而無適不然朱子此處直是心原與中庸相流通方一滚出來功夫只是敬以直内義以方外到徹内徹外地位君子以作事謀始觀彖云理明於素則爭心不生慮周於先則爭端不起按此深可返觀凡處世而有猜嫌忌刻至相戕賊由不講乎此也訟卦九二不克訟歸而逋其邑人三百户无眚傳義於邑人三百戸句皆作自處卑約意似晦觀彖云人能如此雖所居亦化之其邑人三百户皆无灾眚葢退讓之成俗也按此作薰其德而善良意身分太高歸而逋者豈遂臻此朱可亭先生云邑三百户无眚謂不致削奪也九二則三百无眚上九則終朝三禠得失霄壤矣讀比卦九五一爻程傳王心之公溥王道之蕩平使人遊唐虞之世見天地之量凡事君交友無往而非大中至正之道推闡曲盡獨邑人不誡之義朱子謂恐易之文義不如此然朱子本義亦與後來所見不同葢朱子又謂當如歸市者不止耕者不變相似周易折中云言王者田獵近郊之處略不驚擾耳李文貞公融此意而發之云比者親附之辭也陰相比則私矣顯其比則公矣私故計較於物之往來公故渾忘於彼之順逆盡我所以比人之道而不計人之比不比則未嚮乎化者俟之而不追各得其性者安之而不擾此帝王比天下之至也失前禽者當獵之時前禽雖去而不追逐之也邑人不誡者郊野之人不知王者之田獵而戒備也此詩所謂大庖不盈徒御不驚者以象顯比之世逺近相忘大順無迹之盛吉之道也解經至此程朱見之應亦亟加首肯小畜一卦甚難分明葢緣必以陰為小人故也夫卦惟六四一陰柔順得正虚中巽體上近九五正以臣畜君之象何得以小人目之然則下卦三爻為所畜者何曰六四者大臣之位下三爻則後生新進才德正宜蘊畜不當躁進者也初九九二之所以吉者退而以道自守也九三之脱輻反目則躁進之害也初九之復自道九二之牽復極其變在上位有忌才蔽賢之大臣所以自處之道亦如是豈不為所畜而必欲遂其進哉上九一爻以陰畜陽功成則當退而不居此伊尹之所以復政厥辟也其處也樂其進也將有為也程子於素履之義云然又曰若欲貴之心與行道之心交戰於中豈能安履其素也此語深可觀省世俗榮華艷羡之念不脫於胸中處無可樂進無可為素履安在哉俯仰無愧貧賤儘足以自樂職分有虧公卿祗足以為累此處須看得分明友人有病起思遣興者余曰莫如養得神氣安閒展卷玩近思錄三五條覺得餘味無窮掩卷靜坐或散步觀禽魚花草無非活潑生機自不覺沉疴之去體矣泰卦六四一爻與六五皆下交之義好善忘勢休休有容故曰不富與六五皆下交故曰以其鄰上下交而志同故曰不戒以孚葢消長之義九三言之矣上六卦之終又以泰極而否為戒四五與初二正明上下交之義而保泰防否在其中矣此先儒成説與傳義不同然可從也否卦依本義下三爻説小人上三爻説君子然初六一爻諸家多作君子見幾而作斂德辟難者玩象傳志在君也正有深義觀彖云拔茅而退則疑於忘君矣然不茍合於時而守吾道之正以待上之使令乃所以為愛君之至也梁邨師一紗袍服之二十一年今尚可以見客一藍綢袷衣當背汗色盡黄舊且敝矣每退直則服之俸糈稍贏分以贍貧乏之親屬二從嫂孀居月給以糧而家食非客至不買肉夕食粥唯小蔬二三碟而已古人心最平如孟子謂夷惠隘與不恭君子不由而又謂其為百世之師是也後世如陸子靜王陽明陳白沙論學術者必辨之謂其非孔孟程朱之正派也然其砥節礪行以之針砭卑鄙俗夫不亦百世之師耶同人一卦傳義暨諸儒皆不分明六二一爻彖象竟相矛盾唯折中案語逐爻解釋甚為妥恊事雖煩劇其中必有大小重輕遲速先後之宜才雖不敏循序而布之豫時而籌之當幾而决之亦庶乎可不廢弛矣局外談論易了局中顧盼難周非有十分學力而言辦事之才迂魯者踈肆應者駁古人心胸天下大勢動皆了了韓淮陰登壇對諸葛公隆中對是也李忠定公遣張所撫河北傅亮鎮河東宗澤留守舊京如善奕者下子數著大局已定惜乎宋高宗之不足與有為也大有六五一爻觀彖云厥孚交如以信於君子又威如以備小人乃為能盡大有之道所謂遏惡揚善者也故其占曰吉此等處須遍觀先儒之説方知其解經實有一言破的之妙上九一爻當作五尚上九之賢周易折中詳之達理故樂天而不競内充故退讓而不矜此二語可終身涵泳謙卦六四依程傳似更自然六五不富以其鄰不富者欿然不自有其崇高富貴之勢即謙德也以其鄰者德服人而人歸之也六爻皆吉乃謙終身可行其恕此語人常道之然實體者鮮余自忖生平於人稍有齟齬處皆從不謙不恕來可不警與鳴謙者抑畏之至也鳴豫者滿盈之極也敬肆分而吉㓙判矣心安理得而豫者道德之和順也志驕意滿而豫者宴安之酖毒也介于石不終日貞吉此示人以處豫之要道也繫辭備矣邵子曰優好之所勿乆戀得意之地勿再往亦此意也豫卦六五一爻傳義皆有未協如程傳以漢魏末世之君為言其不死也幾何折中所載諸家之説引孟子生於憂患意最切朱可亭先生云豫樂也亦兼有豫先意彖辭利建侯行師如天造草昧利於建侯行師豫先之義也人心効順衆志歸誠建侯行師無有不利豫樂之義也爻辭六二不終日不溺於豫而去之速豫先之豫也六三遲有悔溺於豫不早為計者也九四勿疑則豫於立誠也上六豫而㝠由失計於先也按此先儒所未言者拈出覺實兼此意在内世有口談性命而不知返躬者亦有以性命精微不可窺測者皆非也夫元亨利貞天之命而其實不外於春生夏長秋收冬藏之間仁義禮智人之性而其端不外於惻隱羞惡辭讓是非之内以此仰觀俯察身體心驗了然分明若謂此為聖賢之陳言必更求其杳㝠高妙者是謂索隱之異學抑謂此為聖賢之奥義吾姑守其日用淺近者是謂滯迹之小儒幹蠱言父母則臣之事君義在其中矣雖然子無可外家事者臣則有不與國事者故上九以不事王侯言之不事王侯高尚其事疑若無與於天下矣然亷頑立懦風俗人心賴以維繫者不小東漢節義自嚴子陵振起之相助為理豈必在公卿耶讀李延平先生上豫章先生書不覺慨然時延平年方二十有四其求道之切如此余今三十有二矣理不明事不諳日用動靜功夫不嚴密而返躬多愧自此沈潛篤實以求之猶或可望不然徒負初志而已五月廿一日沈潛以窮理篤實以力行二者總根於敬而已矣敬則中無累而虚故沉潛而於理易入中有主而實故篤實而其行必力許魯齋先生云人心如印板板不差則摹千萬本皆不差板一差則摹之無不差者昔儀封張清恪公嘗舉此以相朂每念之不敢忘噬嗑卦言用獄中四爻為用刑之人然不曰滅鼻則曰遇毒不曰艱貞則曰貞厲刑可易言哉必也仁以體之明以燭之威以斷之而慎以成之庶吉而无咎乎梁邨師云當事變有定識定力方見真學問此非見理明浩然之氣勝置死生禍福於度外不能也剝盡為純坤十月之卦疑其無陽矣然陽氣實蘊於中所謂保合太和者此也按之後天卦圖正是乾位遏抑羣陰胚胎陽氣故曰戰乎乾所謂乾知大始者此也此剝復之間一大義在人心則克去邪私涵養本原而後天理流行之機著焉朱子云天地以生生為德元亨利貞乃生物之心也但其靜而復乃未發之體動而通焉則已發之用一陽來復其始生甚微固若靜矣然動之機日長而萬物莫不資始焉此天命流行之初造化發育之始天地生生不已之心於是而可見也若其靜而未發則此心之體雖無所不在然却未有發見處此程子所以以動之端為天地之心亦舉用以該其體耳按復卦彖傳復見天地之心程子之言精矣必得朱子此條乃不至以辭害意觀此則知復即天地之元也動見天地之心即大哉乾元萬物之所資以始者也朱子又有云伊川與濓溪説復字亦差不同如元亨利貞濓溪就利貞上説復字伊川就元字頭説復字道理只一般只所指地頭不同按朱子前所謂靜而復本濓溪通書也一陽來復云云則正發明伊川元字頭説復字之意邵子所謂坤復之間乃無極又詩云一陽初動處萬物未生時靜極而動此天地之樞機也君子體之於心戒謹恐懼而慎獨者此也中庸之㫖微矣乎朱子與項平父書云子靜尊德性之意多某自覺道問學之意多要當去短集長交致其功説者謂此朱子謙已誨人之辭是也玩此氣象何等和平規勸何等深摯而反已觀省不敢自是非故作謙沖之辭已也象山聞之則曰既不知有德性焉有所謂問學剛愎褊急即此可見立侯云穆堂每辨陸子何嘗不讀書窮理朱子門人乃以廢學誣之然非謂象山全不讀書也其云六經注我我注六經可為讀書之訓乎非謂象山全不窮理也其不信繫辭為孔子書詆訶太極圖説可謂窮理之言乎葢象山位置太高不能抑已從人執意見而自以為無意見要其修身砥行不失為豪傑之士也聖門顔曾而外各因質之所及亦未必人皆純全余謂此論頗為平允然聖門諸弟子所造未必純全自知不及顔曾無敢自號為得聖人之宗而目顔子之博文曾子之格致為支離者若象山則以為自有單傳心印正是孔子之真血脈其病源尤在即心即理上來无妄六二不耕穫不菑畬董子所謂正其誼不謀其利明其道不計其功張南軒所謂為己者無所為而為者也枕上思中庸章句君子尊德性一節為學功夫無以加於此矣存心以極乎道體之大如廓其基址也致知以極乎道體之細如密其間架也人心量最怕狹隘不以一毫私意自蔽則洞然矣心志最怕卑下不以一毫私欲自累則超然矣心中所蓄最怕浮淺涵泳乎其所已知敦篤乎其所已能則醞釀者深矣此皆培養本原之功如廓其基址者也析理則不使有毫釐之差而又日知其所未知處事則不使有過不及之謬而節文更日謹其所未謹此言致知而包力行在内如密其間架者也培養本原為致知力行之地如有基址而後有間架也朱子仁説讀之既乆令人見得本體融通流貫處功夫精切周遍處葢生理涵於心為心之德而義禮智統是矣此生理涵於心即温然愛人利物之心為愛之理故朱子一言以蔽之曰天地以生物為心而人各得天地生物之心以為心也所謂心之德者此也所謂愛之理者此也明夫心之德愛之理之非有二此溫然愛人利物之心即天理坱然生物之心而本體有不融通流貫者乎中間引夫子之言仁則由體而用自常而變一私不容自匿一理不容或虧而功夫有不精切周遍者乎下又發明程子愛不可以言仁而愛之理為仁則性情之界限明而脈絡通本體之妙莫非生生之理者益以著矣辨楊謝之不識仁體泛言同體者無警切之功專言知覺者少沈潛之味則功夫之實在乎操存涵養克己力行然後可以自全其生生之理者益以明矣君子多識前言往行以蓄其德與論語多聞闕疑多見闕殆可叅看唯能闕疑殆而後多識者可為畜德之資程子所謂考迹以觀其用察言以求其心是也不然凌虚駕空者失之玩物喪志者亦失之慎言語節飲食朱子謂二者養德養身之切務舉其要也若論養道之全則程子所謂動息節宣以養生也飲食衣服以養形也威儀行義以養德也推己及物以養人也盡之矣習坎即孟子動心忍性增益不能意惟聖賢豪傑方耐得許多鍜鍊此二五剛中之有孚心亨也程子云若要熟也須從這裏過正習坎之謂也六四樽酒簋貳一讀用缶一句納約自牖程傳至矣離之柔麗中正先儒皆兼二五言惟胡雲峯云坎之剛中九五分數多故九五曰坎不盈卦辭釋有孚亦曰水流而不盈離之中正六二分數多故卦辭曰畜牝牛吉而六二爻辭亦曰黄離元吉按此更精審君子以虚受人虚者無我也克有我之私以至於無我然後其心之虚也萬事投之而不累萬善納之而不盈寂然不動者此也感而遂通天下之故者此也虚之德其至淵妙矣哉日月之升降盈縮終則有始也而萬古常明恒乆不已也四時之寒暑往來終則有始也而亘古不易恒乆不已也推之一草一木一飛一走之榮枯消長皆終則有始也而種類不相侵時序不相亂皆恒乆不已也在聖人則神明變化因物付物無非乆於其道也君子素位而行而立不易方者在是矣周易觀彖論君子自昭明德云明德者人之所得乎天之理具於心而昭明不昧者也人之所以不能常明者氣昏而物蔽之也君子敬勝怠以去其昏義勝欲以撤其蔽此所以自昭其明德之道也明出地上則羣陰退伏人心之德葢亦如此按此段可與大學章句􅄁讀其論晉之全卦云進升之道以柔順為善葢柔則安靜而無躁進之嫌順則循理而無妄動之失卦之爻非無剛也而其彖傳曰柔進而上行明其善在柔也故凡柔爻皆吉按此段審出處之道者不可不察讀家人一卦齊家之道備矣身者家之本也故大象曰君子以言有物而行有恒上九之象傳曰威如之吉反身之謂也閨門嚴肅最治家之要故家人初九即曰閑有家也九五王假有家假作感格之義者是也先儒云初之閑有家是以法度防閑之至王假有家則躬行有以感化之矣家法嚴肅大端在冠昏喪祭之必以禮家道雍睦大端在父子兄弟之不言利淺之則勿聽婦人言深之則刑于寡妻治家之本在是矣納約自牖遇主于巷士君子不得直行己志之時此義不可不講也每念蔡西山獨行不愧影獨寢不愧衾之言使人不敢有斯須之䙝玩趙清獻日所思為夜必焚香以告天立心處事當如是呂與叔在緱氏山房中六月炎蒸閉户端坐終日儼然程子微窺之而歎其敦篤此即吾人不及古人處他尚何言身端容肅則邪妄自退程子所謂整齊嚴肅則心自一一則自無非僻之干此是治心第一關鍵非欲作泥塑木雕也反身修德此無時無處不當然者聖人何故於蹇言之葢蹇之時事勢或有所阻不得有為惟反身修德則無不可為者也且致蹇之由必從失德來能反身修德則濟蹇之本得矣六四往蹇來連荀氏作來承五不可從當依本義葢往者進也來者退也六四雖當位然陰柔才弱往則徒在蹇中不足以濟惟來連九三陽剛得實斯足以承五而濟蹇矣故象曰往蹇來連當位實也懲忿窒欲遷善改過此克己力行之要去凡入聖端在此處此處無力即墮落小人坑塹矣須每日省察當下奮發不肯毫髮放過庶乎可以有進也益用凶事固有之也葢凶事似非以為益然如所謂動心忍性增益不能者於事理固有之也朱可亭先生云然於語氣甚愜有孚惠心勿問元吉呂東萊先生云人君但誠心惠民不須問民之感如此然後元吉按此解勿問二字甚善宋仁宗時交趾貢異獸指為麟司馬溫公曰誠偽不可知使其真非自至不為瑞若偽為逺人笑願厚賜而還之此古人處事最得大體處讀書不免昏惰正所謂不能以志帥氣居然而怠嗚呼不勉為君子之莊敬日強耶蔡節齋謂周子無極而太極之説得於易有太極之一言易者變易無方體即無極之義此語可謂冰解凍釋井卦九五井冽寒泉食美之至矣至上六而後言元吉者何朱可亭先生云此以上爻終五爻之義寒泉食井養也勿幕則養不窮矣九五中正有孚也五不言吉上之元吉即五之謂也按此可補傳義所未及程子定性書乃中庸致中和之極功周易艮其背之妙蘊也朱子語類問艮之象何以為光明曰定則明凡人胸次煩擾則愈見昏昧中有定主則自然光明按此即主敬為致知之本也陳紫峯曰人之一心靜之所養有淺深則發之所中有多寡按此延平所以觀喜怒哀樂未發氣象也艮其背專就靜言者不免言體而不及用動靜並言者又不見體用之分觀彖云天下之動以靜為本靜之道以驗於動為至靜亦定動亦定然後為靜之至也故方其靜也私欲不萌廓然而大公是不獲其身也及其動也智詐不生物來而順應是行其庭不見其人也内不見己外不見人則義理周流而感應之累免矣故无咎此即以定性書作注脚最妙而動根於靜靜以該動尤得艮之本義朱子感興詩云反躬艮其背此内之主一無適也肅容整冠襟此外之整齊嚴肅也保養德性莫過於此艮其輔言有序程子所謂心定者其言重以舒是也旅必擇所主慎所交節所需尤在不資其勢而利其有初六旅瑣瑣斯其所取災或專指童僕賤役言愚謂凡資其勢而利其有皆瑣瑣也必欲如其所願斯其所以取災也故傳曰志窮災也待童僕莊以涖之寛以畜之禮節不假借而飢寒勞苦必加體恤小過宜務包容旅之大象曰君子以明慎用刑而不留獄明而慎則無濫刑慎而明則能燭奸然必速結而不留獄則小民免荒時廢業之苦胥吏無支蔓勒索之弊奸惡者早懲一日則良弱者早伸一日凡居官者切念之朋友講習則道義之浸灌滋潤其悦也不可以言喻有麗澤之象焉有兑之情焉横渠出都門詩云藜藿野心雖萬里不無忠戀向清朝大抵聖賢身雖閒退其心未嘗不念切君民也若恝然長往祗是沮溺荷蓧一流人物耳中孚兼中虚中實二義無累則中虚虚者信之本也有主則中實實者信之質也木必有根本質幹而後枝葉暢茂而復結實焉是故發之言則有物見之行則有恒莫非實理為之質也實理之涵於心則無私主而至虚也故曰實者信之質虚者信之本也中孚之大象何以曰議獄緩死此所謂求其生而不得則死者與我皆無憾也如是則生者感死者服我之心足以孚於人人之心亦已孚於我此中孚之大者也易之言刑獄者五噬嗑之明罰敕法取其明與威也賁之明庶政无敢折獄恐徒恃其明也豐之折獄致刑亦取其明威也旅之明慎用刑而不留獄又以見明之不可不慎而不留獄則惡者懲之善者伸之仁義並至也然而死罪尤不可以輕議也必使死者自問亦無以自免於死然後為兩無憾也故中孚曰君子以議獄緩死嗚呼易象之言刑獄也至矣既濟六爻多戒辭聖人之意深逺矣韓魏公所謂酒闌人散時正謂此也李文靖公日取四方水旱賊盗之事聞於上前使生警懼此得既濟卦之意也周易不終於既濟而以未濟終篇此下藏有無窮之易在焉讀書偶記卷一
